          const pInfo = LFO_PARAM_MAP[d.param];
          if (pInfo && pInfo.isEq && !d.fxUid) {
            targetEl = cardInfo.el.querySelector('.card-eq-canvas');
          } else if (d.fxUid) {
            const panel = cardInfo.el.querySelector(`.fx-panel[data-fx-uid="${d.fxUid}"]`);
            if (panel) {
              if (pInfo && pInfo.isEq) targetEl = panel.querySelector('.card-eq-canvas');
              else targetEl = panel.querySelector('.' + d.param)?.closest('.cslider');
            }
          } else {
            const slider = cardInfo.el.querySelector('.' + d.param);
            if (slider) targetEl = slider.closest('.cslider') || slider;
          }

          if (!targetEl) continue;
          const sliderRect = targetEl.getBoundingClientRect();
          const ex = sliderRect.left + sliderRect.width / 2;
          const ey = sliderRect.top + sliderRect.height / 2;

          const cx1 = sx, cy1 = sy + 40;
          const cx2 = ex, cy2 = ey - 40;
          const pathD = `M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}`;

          // Dotted underlay — always drawn, shows through cards as a hint
          const under = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          under.classList.add('lfo-wire-line', 'lfo-wire-under');
          under.style.stroke = lfo.color;
          under.setAttribute('d', pathD);
          wiresSvg.appendChild(under);

          // Solid overlay — masked out where cards sit
          const over = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          over.classList.add('lfo-wire-line', 'lfo-wire-over');
          over.style.stroke = lfo.color;
          over.setAttribute('d', pathD);
          over.setAttribute('mask', 'url(#wire-card-mask)');
          wiresSvg.appendChild(over);
        }
      }

      // ── Seq wires (seq wire-port → sample tile or waveform canvas) ──
      wiresSvg.querySelectorAll('.seq-wire-line').forEach(w => w.remove());
      for (const [, seq] of seqs) {
        const nodeInfo = seqNodes.get(seq.id);
        if (!nodeInfo || !seq.destinations.length) continue;

        const port = nodeInfo.el.querySelector('.seq-wire-port');
        let sx, sy;
        if (nodeInfo.el.classList.contains('collapsed') || !port) {
          const elRect = nodeInfo.el.getBoundingClientRect();
          sx = elRect.left + elRect.width / 2;
          sy = elRect.top + elRect.height / 2;
        } else {
          const portRect = port.getBoundingClientRect();
          sx = portRect.left + portRect.width / 2;
          sy = portRect.top + portRect.height / 2;
        }

        for (const sampleId of seq.destinations) {
          const cardInfo = openCards.get(sampleId);
          let targetEl;
          if (cardInfo) {
            // Point to the center of the waveform canvas when card is open
            targetEl = cardInfo.el.querySelector('.card-wave-canvas') || cardInfo.el;
          } else {
            targetEl = document.getElementById('t' + sampleId);
          }
          if (!targetEl) continue;
          const tRect = targetEl.getBoundingClientRect();
          const ex = tRect.left + tRect.width / 2;
          const ey = tRect.top + tRect.height / 2;

          const cx1 = sx, cy1 = sy + 40;
          const cx2 = ex, cy2 = ey - 40;
          const pathD = `M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}`;

          // Dotted underlay (shows through cards)
          const under = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          under.classList.add('seq-wire-line', 'lfo-wire-under');
          under.style.stroke = seq.color;
          under.setAttribute('d', pathD);
          wiresSvg.appendChild(under);

          // Solid overlay masked out where cards sit
          const over = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          over.classList.add('seq-wire-line', 'lfo-wire-over');
          over.style.stroke = seq.color;
          over.setAttribute('d', pathD);
          over.setAttribute('mask', 'url(#wire-card-mask)');
          wiresSvg.appendChild(over);
        }
      }

      // ── LFO→Seq wires ──
      wiresSvg.querySelectorAll('.lfo-seq-wire').forEach(w => w.remove());
      for (const [, lfo] of lfos) {
        if (!lfo.seqDestinations.length) continue;
        const lfoNodeInfo = lfoNodes.get(lfo.id);
        if (!lfoNodeInfo) continue;
        const lfoPort = lfoNodeInfo.el.querySelector('.lfo-wire-port');
        let lsx, lsy;
        if (lfoNodeInfo.el.classList.contains('collapsed') || !lfoPort) {
          const elRect = lfoNodeInfo.el.getBoundingClientRect();
          lsx = elRect.left + elRect.width / 2;
          lsy = elRect.top + elRect.height / 2;
        } else {
          const portRect = lfoPort.getBoundingClientRect();
          lsx = portRect.left + portRect.width / 2;
          lsy = portRect.top + portRect.height / 2;
        }
        for (const d of lfo.seqDestinations) {
          const seqNodeInfo = seqNodes.get(d.seqId);
          if (!seqNodeInfo) continue;
          const inputCls = d.param === 'numSteps' ? '.seq-steps-slider' : '.seq-gate-slider';
          const sliderEl = seqNodeInfo.el.querySelector(inputCls);
          if (!sliderEl) continue;
          const sRect = sliderEl.getBoundingClientRect();
          const ex = sRect.left + sRect.width / 2;
          const ey = sRect.top + sRect.height / 2;
          const cx1 = lsx, cy1 = lsy + 30;
          const cx2 = ex, cy2 = ey - 30;
          const pathD = `M${lsx},${lsy} C${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}`;

          const under = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          under.classList.add('lfo-seq-wire', 'lfo-wire-under');
          under.style.stroke = lfo.color;
          under.setAttribute('d', pathD);
          wiresSvg.appendChild(under);

          const over = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          over.classList.add('lfo-seq-wire', 'lfo-wire-over');
          over.style.stroke = lfo.color;
          over.setAttribute('d', pathD);
          over.setAttribute('mask', 'url(#wire-card-mask)');
          wiresSvg.appendChild(over);
        }
      }
    }

    // ── Apply/remove override styling on a slider ──
    function applyParamOverride(sampleId, paramClass, lfo, fxUid = null) {
      const cardInfo = openCards.get(sampleId);
      if (!cardInfo) return;
      let targetWrap = null;
      const pInfo = LFO_PARAM_MAP[paramClass];

      if (fxUid) {
        const panel = cardInfo.el.querySelector(`.fx-panel[data-fx-uid="${fxUid}"]`);
        if (panel) {
          if (pInfo.isEq) targetWrap = panel.querySelector('.card-eq-canvas');
          else targetWrap = panel.querySelector('.' + paramClass)?.closest('.cslider');
        }
      } else if (pInfo && pInfo.isEq) {
        targetWrap = cardInfo.el.querySelector('.card-eq-canvas');
      } else {
        const slider = cardInfo.el.querySelector('.' + paramClass);
        if (slider) targetWrap = slider.closest('.cslider');
      }

      if (!targetWrap) return;
      targetWrap.classList.add('lfo-override');
      targetWrap.style.setProperty('--lfo-color', lfo.color);
      // Add badge if not present and not a canvas
      if (targetWrap.classList.contains('cslider')) {
        const row = targetWrap.closest('.crow');
        if (row && !row.querySelector('.lfo-badge')) {
          const badge = document.createElement('span');
          badge.className = 'lfo-badge';
          badge.textContent = 'LFO';
          badge.style.setProperty('color', lfo.color);
          row.appendChild(badge);
        }
      }
    }

    function unlinkParamOverride(sampleId, paramClass, fxUid = null) {
      const cardInfo = openCards.get(sampleId);
      if (!cardInfo) return;
      let targetWrap = null;
      const pInfo = LFO_PARAM_MAP[paramClass];

      if (fxUid) {
        const panel = cardInfo.el.querySelector(`.fx-panel[data-fx-uid="${fxUid}"]`);
        if (panel) {
          if (pInfo.isEq) targetWrap = panel.querySelector('.card-eq-canvas');
          else targetWrap = panel.querySelector('.' + paramClass)?.closest('.cslider');
        }
      } else if (pInfo && pInfo.isEq) {
        targetWrap = cardInfo.el.querySelector('.card-eq-canvas');
      } else {
        const slider = cardInfo.el.querySelector('.' + paramClass);
        if (slider) targetWrap = slider.closest('.cslider');
      }

      if (!targetWrap) return;
      targetWrap.classList.remove('lfo-override');
      targetWrap.style.removeProperty('--lfo-color');
      const row = targetWrap.closest('.crow');
      if (row) {
        const badge = row.querySelector('.lfo-badge');
        if (badge) badge.remove();
      }
    }

    // ── Reapply overrides when a card is opened ──
    function applyCardOverrides(sampleId) {
      for (const [, lfo] of lfos) {
        for (const d of lfo.destinations) {
          if (d.sampleId === sampleId) {
            applyParamOverride(sampleId, d.param, lfo, d.fxUid);
          }
        }
      }
    }

    // ── Modulation tick — call from phLoop ──
    function lfoModulationTick() {
      const now = performance.now() / 1000;
      for (const [, lfo] of lfos) {
        lfo.tick(now);
        const val = lfo.evaluate(lfo._phase);

        // Update playhead on the LFO node
        const nodeInfo = lfoNodes.get(lfo.id);
        if (nodeInfo) {
          const ph = nodeInfo.el.querySelector('.lfo-playhead');
          if (ph) {
            const shapeWrap = nodeInfo.el.querySelector('.lfo-shape-wrap');
            const sw = shapeWrap ? shapeWrap.clientWidth : 200;
            ph.style.left = (lfo._phase * sw) + 'px';
          }
        }

        // Apply modulation to destinations
        for (const d of lfo.destinations) {
          const s = samples.get(d.sampleId);
          if (!s || !(s instanceof Sample)) continue;
          const pInfo = LFO_PARAM_MAP[d.param];
          if (!pInfo) continue;

          const modVal = d.min + val * (d.max - d.min);

          // Apply to Sample / FX / EQ
          if (d.fxUid) {
            const inst = s.fxChain.find(i => i.uid === d.fxUid);
            if (inst) {
              if (pInfo.isEq) {
                const band = inst.eqData.bands[pInfo.bandIdx];
                band[pInfo.prop] = modVal;
                inst.eqData.applyBand(pInfo.bandIdx);
              } else {
                inst.params[pInfo.prop] = modVal;
                const nodeParam = inst.node[pInfo.prop];
                if (nodeParam && typeof nodeParam === 'object' && 'value' in nodeParam) {
                  nodeParam.value = modVal;
                } else {
                  inst.node[pInfo.prop] = modVal;
                }
              }
            }
          } else if (pInfo.isEq) {
            const band = s.eqBands[pInfo.bandIdx];
            band[pInfo.prop] = modVal;
            const filter = s.eqFilters[pInfo.bandIdx];
            if (pInfo.prop === 'freq') filter.frequency.value = modVal;
            else if (pInfo.prop === 'gain') filter.gain.value = modVal;
          } else if (pInfo.setter && typeof s[pInfo.setter] === 'function') {
            s[pInfo.setter](modVal);
          } else if (pInfo.prop === '_psSlider') {
            const ratio = modVal < 0.25 ? 1 : Math.pow(200, modVal / 100);
            s.setPsStretch(ratio);
          } else {
            s[pInfo.prop] = modVal;
            if (pInfo.prop === 'attackTime' || pInfo.prop === 'releaseTime' || pInfo.prop === 'crossfadeTime') {
              s._fadedBuf = null; s._psFadedBuf = null;
            }
          }

          // Update open card UI
          const cardInfo = openCards.get(d.sampleId);
          if (cardInfo) {
            let context = cardInfo.el;
            if (d.fxUid) context = cardInfo.el.querySelector(`.fx-panel[data-fx-uid="${d.fxUid}"]`) || cardInfo.el;

            if (pInfo.isEq) {
              const canvas = context.querySelector('.card-eq-canvas');
              if (canvas && canvas._redraw) canvas._redraw();
            } else {
              const slider = context.querySelector('.' + d.param);
              if (slider) {
                slider.value = modVal;
                const wrap = slider.closest('.cslider');
                if (wrap?._syncPos) wrap._syncPos();
              }
            }
          }
        }

        // Apply to seq destinations
        for (const d of lfo.seqDestinations) {
          const seq = seqs.get(d.seqId);
          if (!seq) continue;
          const modVal = d.min + val * (d.max - d.min);
          const nodeInfo = seqNodes.get(d.seqId);
          if (d.param === 'numSteps') {
            const n = Math.max(1, Math.min(16, Math.round(modVal)));
            if (n !== seq.numSteps) {
              seq.numSteps = n;
              if (nodeInfo) {
                const inp = nodeInfo.el.querySelector('.seq-steps-input');
                if (inp) { inp.value = n; inp.dispatchEvent(new Event('input')); }
              }
            }
          } else if (d.param === 'gateLength') {
            seq.gateLength = Math.max(0, Math.min(1, modVal));
            if (nodeInfo) {
              const inp = nodeInfo.el.querySelector('.seq-gate-input');
              if (inp) {
                inp.value = Math.sqrt(seq.gateLength).toFixed(3);
                inp.closest('.cslider')?._syncPos?.();
              }
            }
          }
        }
      }
    }

    // ── Remove LFO ──
    function duplicateLfo(srcLfo) {
      if (lfos.size >= MAX_LFOS) return null;
      const id = nextLfoId++;
      const lfo = new LFO(id, srcLfo.x + 20, srcLfo.y + 20);
      lfo.rate = srcLfo.rate;
      lfo.gridSync = srcLfo.gridSync;
      lfo.subdiv = srcLfo.subdiv;
      lfo.shape = JSON.parse(JSON.stringify(srcLfo.shape));
      lfo._activePreset = srcLfo._activePreset;
      lfos.set(id, lfo);
      createLfoNode(lfo);
      return lfo;
    }

    function removeLfo(id) {
      const lfo = lfos.get(id);
      if (!lfo) return;
      // Unlink all destinations
      for (const d of [...lfo.destinations]) {
        unlinkParamOverride(d.sampleId, d.param);
      }
      lfo.destinations = [];
      // Remove node
      const nodeInfo = lfoNodes.get(id);
      if (nodeInfo) nodeInfo.el.remove();
      lfoNodes.delete(id);
      lfos.delete(id);
      updateLfoWires();
    }

    // ── Add LFO button ──
    document.getElementById('btn-add-lfo').addEventListener('click', () => {
      const id = nextLfoId++;
      const cx = (cv.clientWidth || 800) / 2 + (id - 1) * 30;
      const cy = (cv.clientHeight || 500) / 2 + (id - 1) * 20;
      const lfo = new LFO(id, cx, cy);
      lfos.set(id, lfo);
      createLfoNode(lfo);
    });

    // ── Seq duplicate & remove ──
    function duplicateSeq(srcSeq) {
      if (seqs.size >= MAX_SEQS) return null;
      const id = nextSeqId++;
      const seq = new StepSequencer(id, srcSeq.x + 20, srcSeq.y + 20);
      seq.numSteps = srcSeq.numSteps;
      seq.steps = [...srcSeq.steps];
      // destinations not copied — new seq starts unconnected
      seq.gateLength = srcSeq.gateLength;
      seq.gridSync = srcSeq.gridSync;
      seq.subdiv = srcSeq.subdiv;
      seq.rate = srcSeq.rate;
      seqs.set(id, seq);
      createSeqNode(seq);
      return seq;
    }

    function removeSeq(id) {
      const seq = seqs.get(id);
      if (!seq) return;
      seq.unschedule();
      // Disconnect all controlled samples and restart their internal playback
      for (const sampleId of [...seq.destinations]) {
        sampleSeqMap.delete(sampleId);
        const tile = document.getElementById('t' + sampleId);
        if (tile) { tile.classList.remove('seq-controlled'); tile.style.removeProperty('--seq-ctrl-color'); }
        const s = samples.get(sampleId);
        if (s instanceof Sample && audioReady && isPlaying) startSample(s);
      }
      seq.destinations = [];
      // Disconnect any LFO→seq connections
      for (const [, lfo] of lfos) {
        const before = lfo.seqDestinations.length;
        lfo.seqDestinations = lfo.seqDestinations.filter(d => d.seqId !== id);
        if (lfo.seqDestinations.length !== before) lfoNodes.get(lfo.id)?.updateDestList();
      }
      const nodeInfo = seqNodes.get(id);
      if (nodeInfo) {
        nodeInfo.stopAnim();
        nodeInfo.el.remove();
      }
      seqNodes.delete(id);
      seqs.delete(id);
      updateLfoWires();
    }

    // ── Add Step Sequencer button ──
    document.getElementById('btn-add-seq').addEventListener('click', () => {
      if (seqs.size >= MAX_SEQS) return;
      const id = nextSeqId++;
      const cx = (cv.clientWidth || 800) / 2 + (id - 1) * 30;
      const cy = (cv.clientHeight || 500) / 2 + (id - 1) * 20;
      const seq = new StepSequencer(id, cx, cy);
      seqs.set(id, seq);
      createSeqNode(seq);
    });

    // ════════════════════════════════════════════════════
    // DRAG & DROP
    // ════════════════════════════════════════════════════
    let dn = 0;
    document.addEventListener('dragenter', e => {
      e.preventDefault(); dn++;
      document.getElementById('drop-overlay').classList.add('active');
    });
    document.addEventListener('dragleave', e => {
      if (--dn <= 0) { dn = 0; document.getElementById('drop-overlay').classList.remove('active'); }
    });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', async e => {
      e.preventDefault(); dn = 0;
      document.getElementById('drop-overlay').classList.remove('active');
      if (!audioReady) { alert('Please click Initialize Audio first.'); return; }
      const files = e.dataTransfer.files;
      if (files.length === 1 && files[0].name.toLowerCase().endsWith('.json')) {
        loadProject(await files[0].text());
        return;
      }
      const dropPos = { x: e.clientX, y: e.clientY };
      if (e.dataTransfer.items?.length) await importFromDT(e.dataTransfer.items, e.dataTransfer.files, dropPos);
      else importList(e.dataTransfer.files, dropPos);
    });

    document.getElementById('import-btn').addEventListener('click', () => {
      if (!audioReady) { alert('Please initialize audio first.'); return; }
      document.getElementById('file-input').click();
    });
    document.getElementById('file-input').addEventListener('change', async e => {
      importList(e.target.files); e.target.value = '';
    });

    document.getElementById('save-btn').addEventListener('click', () => {
      if (!audioReady) { alert('Please initialize audio first.'); return; }
      if (samples.size === 0) { alert('Nothing to save — load some samples first.'); return; }
      saveProject();
    });
    document.getElementById('open-btn').addEventListener('click', () => {
      if (!audioReady) { alert('Please initialize audio first.'); return; }
      document.getElementById('project-input').click();
    });
    document.getElementById('project-input').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (file) { loadProject(await file.text()); }
      e.target.value = '';
    });

    // ════════════════════════════════════════════════════
    // KEYBOARD
    // ════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        if (audioReady) isPlaying ? pauseAll() : playAll();
      }
      if (e.key === '.') stopAll();
      if (e.key === 'Escape') { for (const id of [...openCards.keys()]) closeCard(id); }
    });

    // ════════════════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════════════════
    updateEmpty();
  </script>
</body>
