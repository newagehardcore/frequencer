          ctx.lineWidth = 1;
          ctx.stroke();

          if (isHP || isLP) {
            ctx.font = '7px Courier New';
            ctx.textAlign = isHP ? 'right' : 'left';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = isActive ? '#fff' : 'rgba(255,255,255,0.2)';
            const label = isHP ? 'HP' : 'LP';
            ctx.fillText(label, isHP ? bx - r - 3 : bx + r + 3, by);
          }
        });
      }

      function getBandAt(mx, my) {
        const W = eqCanvas.width, H = eqCanvas.height;
        let best = -1, bestDist = Infinity;
        eqBands.forEach((band, i) => {
          const bx = Math.max(6, Math.min(W - 6, fToX(band.freq, W)));
          const by = band.type === 'peaking'
            ? Math.max(6, Math.min(H - 6, gToY(band.gain || 0, H)))
            : H / 2;
          const d = Math.hypot(mx - bx, my - by);
          if (d < bestDist) { bestDist = d; best = i; }
        });
        return bestDist < 20 ? best : -1;
      }

      eqCanvas.addEventListener('mousedown', e => {
        e.stopPropagation(); e.preventDefault();
        const rect = eqCanvas.getBoundingClientRect();
        const sx = eqCanvas.width / rect.width, sy = eqCanvas.height / rect.height;
        const mx = (e.clientX - rect.left) * sx;
        const my = (e.clientY - rect.top) * sy;
        dragBand = getBandAt(mx, my);
        if (dragBand < 0) return;
        draw();

        const W = eqCanvas.width, H = eqCanvas.height;
        const onMove = ev => {
          const mx2 = (ev.clientX - rect.left) * sx;
          const my2 = (ev.clientY - rect.top) * sy;
          const band = eqBands[dragBand];
          band.freq = Math.max(MIN_F, Math.min(MAX_F, xToF(mx2, W)));
          if (band.type === 'peaking') {
            band.gain = Math.max(-MAX_G, Math.min(MAX_G, yToG(my2, H)));
          }
          applyBandFn(dragBand);
          draw();
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          dragBand = -1;
          draw();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      eqCanvas.addEventListener('mousemove', e => {
        if (dragBand >= 0) return;
        const rect = eqCanvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (eqCanvas.width / rect.width);
        const my = (e.clientY - rect.top) * (eqCanvas.height / rect.height);
        eqCanvas.style.cursor = getBandAt(mx, my) >= 0 ? 'grab' : 'crosshair';
      });

      eqCanvas.addEventListener('wheel', e => {
        e.preventDefault();
        const rect = eqCanvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (eqCanvas.width / rect.width);
        const my = (e.clientY - rect.top) * (eqCanvas.height / rect.height);
        const bi = getBandAt(mx, my);
        if (bi < 0 || eqBands[bi].type !== 'peaking') return;
        const band = eqBands[bi];
        band.q = Math.max(0.1, Math.min(20, band.q * (e.deltaY > 0 ? 1.25 : 0.8)));
        applyBandFn(bi);
        draw();
      }, { passive: false });

      const clearBtn = eqCanvas.closest('.fx-body-inner')?.querySelector('.card-eq-clear');
      if (clearBtn) {
        clearBtn.addEventListener('click', e => {
          e.stopPropagation();
          eqBands[0].freq = 20; eqBands[0].q = 0.707;
          eqBands[1].freq = 200; eqBands[1].gain = 0; eqBands[1].q = 1;
          eqBands[2].freq = 1000; eqBands[2].gain = 0; eqBands[2].q = 1;
          eqBands[3].freq = 8000; eqBands[3].gain = 0; eqBands[3].q = 1;
          eqBands[4].freq = 22050; eqBands[4].q = 0.707;
          for (let i = 0; i < 5; i++) applyBandFn(i);
          draw();
        });
      }

      eqCanvas._redraw = draw;
      requestAnimationFrame(initCanvas);
    }

    function initCslider(wrap, fmt) {
      if (!fmt) fmt = fmtFade;
      const native = wrap.querySelector('input[type=range]');
      const thumb = wrap.querySelector('.cslider-thumb');
      const lbl = wrap.querySelector('.cslider-lbl');
      const edit = wrap.querySelector('.cslider-edit');

      function syncPos() {
        const min = parseFloat(native.min), max = parseFloat(native.max);
        const val = parseFloat(native.value);
        const norm = max > min ? (val - min) / (max - min) : 0;
        thumb.style.left = (Math.max(0, Math.min(1, norm)) * 100) + '%';
        lbl.textContent = fmt(val);
      }
      wrap._syncPos = syncPos;
      native.addEventListener('input', syncPos);
      syncPos();

      wrap.addEventListener('mousedown', e => {
        if (wrap.classList.contains('editing') || native.disabled) return;
        e.preventDefault(); e.stopPropagation();
        const rect = wrap.getBoundingClientRect();
        function update(ev) {
          const min = parseFloat(native.min), max = parseFloat(native.max);
          const step = parseFloat(native.step) || 0.001;
          const t = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
          const raw = min + t * (max - min);
          const stepped = Math.round(raw / step) * step;
          native.value = Math.max(min, Math.min(max, stepped));
          native.dispatchEvent(new Event('input'));
        }
        update(e);
        const mm = ev => update(ev);
        const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });

      thumb.addEventListener('dblclick', e => {
        e.stopPropagation();
        if (native.disabled) return;
        wrap.classList.add('editing');
        edit.value = parseFloat(native.value).toFixed(3);
        edit.focus(); edit.select();
      });

      edit.addEventListener('keydown', e => {
        e.stopPropagation();
        if (e.key === 'Enter' || e.key === 'Escape') edit.blur();
      });
      edit.addEventListener('blur', () => {
        wrap.classList.remove('editing');
        const v = parseFloat(edit.value);
        if (!isNaN(v)) {
          const min = parseFloat(native.min), max = parseFloat(native.max);
          native.value = Math.max(min, Math.min(max, v));
          native.dispatchEvent(new Event('input'));
        }
      });
      edit.addEventListener('click', e => e.stopPropagation());
      edit.addEventListener('mousedown', e => e.stopPropagation());
    }

    // Tile click opens/closes card for that sample
    function openInspector(id) {
      const t = document.getElementById('t' + id);
      if (t) openCard(id, t);
    }
    function closeInspector(id) { closeCard(id); }

    // ════════════════════════════════════════════════════
    // TRANSPORT
    // ════════════════════════════════════════════════════
    let metroPart = null;
    let beatRaf;

    Tone.Transport.bpm.value = 120;

    document.getElementById('btn-play').addEventListener('click', () => {
      if (!audioReady) return;
      isPlaying ? pauseAll() : playAll();
    });
    document.getElementById('btn-stop').addEventListener('click', () => {
      if (!audioReady) return;
      stopAll();
    });

    function playAll() {
      isPlaying = true;
      document.getElementById('btn-play').classList.add('playing');
      Tone.Transport.start();
      for (const [, s] of samples) if (s instanceof Sample && !s.playing) startSample(s);
      for (const [, seq] of seqs) seq.reschedule();
      if (metroOn) buildMetro();
      beatTick();
    }

    function pauseAll() {
      isPlaying = false;
      document.getElementById('btn-play').classList.remove('playing');
      Tone.Transport.pause();
      for (const [, s] of samples) if (s instanceof Sample) s.stop();
    }

    function stopAll() {
      isPlaying = false;
      document.getElementById('btn-play').classList.remove('playing');
      Tone.Transport.stop();
      Tone.Transport.position = 0;
      for (const [, s] of samples) if (s instanceof Sample) s.stop();
      for (const [, seq] of seqs) seq.unschedule();
      // beat-pos removed
      cancelAnimationFrame(beatRaf);
    }

    function beatTick() {
      cancelAnimationFrame(beatRaf);
      const up = () => {
        if (!isPlaying) return;
        const p = Tone.Transport.position.split(':');
        const bar = (parseInt(p[0]) || 0) + 1;
        const beat = (parseInt(p[1]) || 0) + 1;
        const tick = parseInt(parseFloat(p[2] || 0));
        beatRaf = requestAnimationFrame(up);
      };
      beatRaf = requestAnimationFrame(up);
    }

    function buildMetro() {
      if (metroPart) { metroPart.dispose(); metroPart = null; }
      if (!metroOn) return;
      const clk = new Tone.MetalSynth({
        frequency: 700, harmonicity: 5.1, modulationIndex: 32,
        resonance: 4000, octaves: 1.5,
        envelope: { attack: 0.001, decay: 0.06, release: 0.01 }
      }).toDestination();
      clk.volume.value = -15;
      metroPart = new Tone.Sequence((time, i) => {
        clk.frequency.value = i === 0 ? 1000 : 650;
        clk.triggerAttackRelease('32n', time);
        Tone.Draw.schedule(() => {
          const d = document.getElementById('metro-dot');
          d.classList.add('flash');
          setTimeout(() => d.classList.remove('flash'), i === 0 ? 90 : 55);
        }, time);
      }, [0, 1, 2, 3], '4n');
      metroPart.start(0);
    }

    document.getElementById('tog-metro').addEventListener('click', () => {
      metroOn = !metroOn;
      document.getElementById('tog-metro').classList.toggle('playing', metroOn);
      if (metroOn && isPlaying) buildMetro();
      else if (!metroOn && metroPart) { metroPart.dispose(); metroPart = null; }
    });

    // BPM — drag to change, double-click to type
    const bpmEl = document.getElementById('bpm-val');
    let bpmY0, bpmV0;
    bpmEl.addEventListener('mousedown', e => {
      if (e.detail > 1) return;
      e.preventDefault();
      bpmY0 = e.clientY; bpmV0 = Tone.Transport.bpm.value;
      const mm = ev => {
        const bpm = Math.max(20, Math.min(300, Math.round(bpmV0 + (bpmY0 - ev.clientY) * 0.5)));
        Tone.Transport.bpm.value = bpm;
        bpmEl.textContent = bpm;
      };
      const mu = () => {
        document.removeEventListener('mousemove', mm);
        document.removeEventListener('mouseup', mu);
      };
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', mu);
    });
    bpmEl.addEventListener('dblclick', () => {
      const inp = document.createElement('input');
      inp.type = 'number'; inp.value = Tone.Transport.bpm.value;
      inp.style.cssText =
        'background:#000;border:1px solid #fff;color:#fff;' +
        'font-family:Courier New,monospace;font-size:22px;font-weight:700;' +
        'width:70px;text-align:center;padding:1px;';
      bpmEl.replaceWith(inp); inp.focus(); inp.select();
      const done = () => {
        const v = Math.max(20, Math.min(300, parseInt(inp.value) || 120));
        Tone.Transport.bpm.value = v;
        bpmEl.textContent = v;
        inp.replaceWith(bpmEl);
      };
      inp.addEventListener('blur', done);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') done(); });
    });

    // ════════════════════════════════════════════════════
    // RECORDING  — MediaRecorder → decodeAudioData → WAV
    // AudioWorklet and ScriptProcessorNode both fail from
    // file:// context; MediaStreamDestination works fine.
    // The recorded buffer is decoded back to PCM and written
    // as a standard 16-bit WAV so DAWs open it natively.
    // ════════════════════════════════════════════════════
    let isRecording = false;
    let recRaf = null;
    let recStartTime = null;
    let recTs = '';
    let recMixState = null;            // { rec, chunks, dest, sources }
    const recStems = new Map();        // sampleId → { rec, chunks, dest, src, name }

    document.getElementById('btn-rec').addEventListener('click', () => {
      if (!audioReady) return;
      if (isRecording) stopRecording();
      else startRecording();
    });

    function startRecording() {
      const active = [...samples.values()].filter(s => s instanceof Sample);
      if (!active.length) return;

      isRecording = true;
      recStartTime = Date.now();
      recTs = recTimestampStr();

      const ctx = Tone.context.rawContext;

      // Mix: all vol nodes → one MediaStreamDestination
      const mixDest = ctx.createMediaStreamDestination();
      for (const s of active) s.vol.connect(mixDest);
      const mixRec = new MediaRecorder(mixDest.stream);
      const mixChunks = [];
      mixRec.ondataavailable = e => { if (e.data.size > 0) mixChunks.push(e.data); };
      mixRec.start();
      recMixState = { rec: mixRec, chunks: mixChunks, dest: mixDest, sources: [...active] };

      // Stems: one MediaStreamDestination per sample
      recStems.clear();
      for (const s of active) {
        const dest = ctx.createMediaStreamDestination();
        s.vol.connect(dest);
        const rec = new MediaRecorder(dest.stream);
        const chunks = [];
        rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        rec.start();
        recStems.set(s.id, { rec, chunks, dest, src: s.vol, name: s.name });
      }

      document.getElementById('btn-rec').classList.add('recording');
      document.getElementById('rec-timer').classList.add('active');
      recTimerTick();
    }

    function stopRecording() {
      if (!isRecording) return;
      isRecording = false;
      cancelAnimationFrame(recRaf);

      const ts = recTs;
      const ctx = Tone.context.rawContext;

      // Track mix and stems separately so the modal knows which is which
      let mixJob = null;
      const stemJobList = [];

      if (recMixState) {
        const { rec, chunks, dest, sources } = recMixState;
        const p = new Promise(res => { rec.onstop = res; });
        rec.stop();
        mixJob = {
          p, chunks, mimeType: rec.mimeType,
          cleanup: () => { for (const s of sources) { try { s.vol.disconnect(dest); } catch (e) { } } }
        };
        recMixState = null;
      }

      for (const [, cap] of recStems) {
        const { rec, chunks, dest, src, name } = cap;
        const p = new Promise(res => { rec.onstop = res; });
        rec.stop();
        stemJobList.push({
          p, chunks, mimeType: rec.mimeType,
          safeName: name.replace(/[^a-z0-9_\-\.]/gi, '_'),
          cleanup: () => { try { src.disconnect(dest); } catch (e) { } }
        });
      }
      recStems.clear();

      // Helper: disconnect nodes, decode webm → AudioBuffer → WAV blob
      const decodeToWAV = async (job) => {
        job.cleanup();
        const raw = new Blob(job.chunks, { type: job.mimeType });
        try {
          const audioBuf = await ctx.decodeAudioData(await raw.arrayBuffer());
          return audioBufToWAV(audioBuf);
        } catch {
          return raw; // fallback to raw webm if decode fails
        }
      };

      const allJobs = [mixJob, ...stemJobList].filter(Boolean);
      Promise.all(allJobs.map(j => j.p)).then(async () => {
        const mixWav = mixJob ? await decodeToWAV(mixJob) : null;
        const stemWavs = await Promise.all(
          stemJobList.map(async job => ({
            wav: await decodeToWAV(job),
            filename: `${ts}_${job.safeName}.wav`
          }))
        );
        showRecModal(ts, mixWav, stemWavs);
      });

      document.getElementById('btn-rec').classList.remove('recording');
      const timerEl = document.getElementById('rec-timer');
      timerEl.classList.remove('active');
      timerEl.textContent = '--:--';
    }

    function showRecModal(ts, mixWav, stemWavs) {
      const modal = document.getElementById('rec-modal');
      modal.style.display = 'flex';

      const close = () => { modal.style.display = 'none'; };

      const dlMix = () => {
        if (mixWav) recDownload(mixWav, `${ts}_mix.wav`);
      };

      const dlStems = async () => {
        const zip = new JSZip();
        for (const { wav, filename } of stemWavs) zip.file(filename, wav);
        // STORE (no compression) — WAV is already uncompressed PCM, compressing gains nothing
        const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
        recDownload(zipBlob, `${ts}_stems.zip`);
      };

      document.getElementById('rec-dl-both').onclick = async () => { close(); dlMix(); await dlStems(); };
      document.getElementById('rec-dl-mix').onclick = () => { close(); dlMix(); };
      document.getElementById('rec-dl-stems').onclick = async () => { close(); await dlStems(); };
      document.getElementById('rec-dl-cancel').onclick = () => { close(); };
    }

    // Encode an AudioBuffer as a 16-bit PCM WAV blob
    function audioBufToWAV(audioBuf) {
      const sr = audioBuf.sampleRate;
      const nCh = Math.min(2, audioBuf.numberOfChannels);
      const nFrames = audioBuf.length;
      const bps = 16, blockAlign = nCh * (bps / 8);
      const dataBytes = nFrames * blockAlign;
      const buf = new ArrayBuffer(44 + dataBytes);
      const v = new DataView(buf);
      const ws = (off, str) => { for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); };
      ws(0, 'RIFF'); v.setUint32(4, 36 + dataBytes, true);
      ws(8, 'WAVE'); ws(12, 'fmt ');
      v.setUint32(16, 16, true); v.setUint16(20, 1, true); // PCM
      v.setUint16(22, nCh, true); v.setUint32(24, sr, true);
      v.setUint32(28, sr * blockAlign, true); v.setUint16(32, blockAlign, true);
      v.setUint16(34, bps, true); ws(36, 'data'); v.setUint32(40, dataBytes, true);
      const channels = Array.from({ length: nCh }, (_, c) => audioBuf.getChannelData(c));
      let off = 44;
      for (let i = 0; i < nFrames; i++) {
        for (let c = 0; c < nCh; c++) {
          v.setInt16(off, Math.max(-1, Math.min(1, channels[c][i])) * 0x7FFF, true);
          off += 2;
        }
      }
      return new Blob([buf], { type: 'audio/wav' });
    }

    function recTimestampStr() {
      const d = new Date();
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}_${p(d.getHours())}-${p(d.getMinutes())}-${p(d.getSeconds())}`;
    }

    function recDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 15000);
    }

    function recTimerTick() {
      const el = document.getElementById('rec-timer');
      const tick = () => {
        if (!isRecording) return;
        const sec = Math.floor((Date.now() - recStartTime) / 1000);
        el.textContent = `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`;
        recRaf = requestAnimationFrame(tick);
      };
      recRaf = requestAnimationFrame(tick);
    }

    // ════════════════════════════════════════════════════
    // PROJECT SAVE / LOAD
    // ════════════════════════════════════════════════════
    function audioBufferToWavBase64(buffer) {
      const numCh = buffer.numberOfChannels;
      const sr = buffer.sampleRate;
      const len = buffer.length;
      const byteRate = sr * numCh * 2;
      const blockAlign = numCh * 2;
      const dataSize = len * numCh * 2;
      const ab = new ArrayBuffer(44 + dataSize);
      const view = new DataView(ab);
      const ws = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
      ws(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
      ws(8, 'WAVE'); ws(12, 'fmt ');
      view.setUint32(16, 16, true); view.setUint16(20, 1, true);
      view.setUint16(22, numCh, true); view.setUint32(24, sr, true);
      view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
      view.setUint16(34, 16, true);
      ws(36, 'data'); view.setUint32(40, dataSize, true);
      let off = 44;
      for (let i = 0; i < len; i++) {
        for (let ch = 0; ch < numCh; ch++) {
          const v = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
          view.setInt16(off, v < 0 ? v * 0x8000 : v * 0x7FFF, true);
          off += 2;
        }
      }
      const bytes = new Uint8Array(ab);
      let bin = '';
      const chunk = 8192;
      for (let i = 0; i < bytes.length; i += chunk)
        bin += String.fromCharCode(...bytes.subarray(i, Math.min(i + chunk, bytes.length)));
      return btoa(bin);
    }

    function saveProject() {
      const projectData = { version: 1, bpm: Tone.Transport.bpm.value, samples: [], lfos: [], seqs: [] };
      for (const [, s] of samples) {
        if (!(s instanceof Sample)) continue;
        const fxChainData = s.fxChain.map(inst => {
          if (inst.type === 'eq') return { type: 'eq', bands: inst.eqData.bands.map(b => ({ ...b })) };
          return { type: inst.type, params: { ...inst.params }, postFader: !!inst.postFader };
        });
        projectData.samples.push({
          name: s.name, x: s.x, y: s.y, color: s.color,
          pitchST: s.pitchST, stretchST: s.stretchST, psStretch: s.psStretch, reversed: s.reversed,
          loopStart: s.loopStart, loopEnd: s.loopEnd, filePosition: s.filePosition,
          muted: s.muted, gridSync: s.gridSync, subdiv: s.subdiv,
          subdivFactor: s.subdivFactor, gridMulti: s.gridMulti,
          attackTime: s.attackTime, releaseTime: s.releaseTime,
          crossfadeTime: s.crossfadeTime, clipGainDb: s.clipGainDb,
          eqBands: s.eqBands.map(b => ({ ...b })),
          fxChain: fxChainData,
          audioB64: audioBufferToWavBase64(s.raw)
        });
      }
      // Save LFOs
      for (const [, lfo] of lfos) {
        projectData.lfos.push({
          id: lfo.id, name: lfo.name, x: lfo.x, y: lfo.y, color: lfo.color,
          shape: lfo.shape.map(p => ({ x: p.x, y: p.y })),
          rate: lfo.rate, gridSync: lfo.gridSync, subdiv: lfo.subdiv,
          _activePreset: lfo._activePreset,
          destinations: lfo.destinations.map(d => ({ sampleId: d.sampleId, param: d.param, min: d.min, max: d.max })),
          seqDestinations: lfo.seqDestinations.map(d => ({ seqId: d.seqId, param: d.param, min: d.min, max: d.max }))
        });
      }
      // Save step sequencers
      for (const [, seq] of seqs) {
        projectData.seqs.push({
          id: seq.id, name: seq.name, x: seq.x, y: seq.y, color: seq.color,
          numSteps: seq.numSteps, steps: [...seq.steps],
          destinations: [...seq.destinations],
          gateLength: seq.gateLength,
          gridSync: seq.gridSync, subdiv: seq.subdiv, rate: seq.rate
        });
      }
      const blob = new Blob([JSON.stringify(projectData)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'frequencer-project.json';
      a.click(); URL.revokeObjectURL(url);
    }

    function applyFxNodeParams(inst) {
      const { type, node, params: p } = inst;
      switch (type) {
        case 'reverb': node.decay = p.decay; node.preDelay = p.preDelay; node.wet.value = p.wet; break;
        case 'delay': node.delayTime.value = p.delayTime; node.feedback.value = p.feedback; node.wet.value = p.wet; break;
        case 'tremolo': node.frequency.value = p.frequency; node.depth.value = p.depth; node.wet.value = p.wet; break;
        case 'dist': node.distortion = p.distortion; node.wet.value = p.wet; break;
        case 'chorus': node.frequency.value = p.frequency; node.delayTime = p.delayTime; node.depth = p.depth; node.wet.value = p.wet; break;
        case 'phaser': node.frequency.value = p.frequency; node.octaves = p.octaves; node.baseFrequency = p.baseFrequency; node.wet.value = p.wet; break;
        case 'bitcrush': node.bits = p.bits; node.wet.value = p.wet; break;
      }
    }

    async function loadProject(jsonText) {
      let data;
      try { data = JSON.parse(jsonText); } catch (e) { alert('Invalid project file.'); return; }
      if (!data.samples) { alert('Not a valid Frequencer project file.'); return; }

      // Clear existing session
      [...samples.keys()].forEach(id => removeSample(id));
      soloId = null;

      // Restore BPM
      if (typeof data.bpm === 'number') {
        Tone.Transport.bpm.value = data.bpm;
        document.getElementById('bpm-val').textContent = Math.round(data.bpm);
      }

      // Restore samples
      for (const sd of data.samples) {
        if (!sd.audioB64) continue;
        try {
          const bin = atob(sd.audioB64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          const decoded = await new Promise((res, rej) =>
            Tone.context.rawContext.decodeAudioData(bytes.buffer, res, rej)
          );
          const id = nextId++;
          const s = new Sample(id, sd.name, decoded, sd.x, sd.y);

          // Restore color
          if (sd.color) s.color = sd.color;

          // Restore settings via built-in setters
          s.setPitch(sd.pitchST || 0);
          s.setStretch(sd.stretchST || 0);
          if (sd.psStretch > 1) s.setPsStretch(sd.psStretch);
          s.setClipGain(sd.clipGainDb || 0);
          s.loopStart = sd.loopStart ?? 0;
          s.loopEnd = sd.loopEnd ?? 1;
          s.filePosition = sd.filePosition ?? s.loopStart;
          s.gridSync = sd.gridSync || false;
          s.subdiv = sd.subdiv || 1;
          s.subdivFactor = sd.subdivFactor || 1;
          s.gridMulti = sd.gridMulti || 1;
          s.attackTime = sd.attackTime || 0;
          s.releaseTime = sd.releaseTime || 0;
          s.crossfadeTime = sd.crossfadeTime || 0;
          if (sd.reversed) s.setReverse(true);

          // Restore main 5-band EQ
          if (Array.isArray(sd.eqBands) && sd.eqBands.length === 5) {
            sd.eqBands.forEach((b, i) => {
              s.eqBands[i] = { ...b };
              s.eqFilters[i].frequency.value = b.freq;
              s.eqFilters[i].Q.value = b.q;
              if (b.type === 'peaking') s.eqFilters[i].gain.value = b.gain || 0;
            });
          }

          // Restore FX rack
          if (Array.isArray(sd.fxChain)) {
            for (const fxd of sd.fxChain) {
              const inst = s.addFxInstance(fxd.type);
              if (!inst) continue;
              if (fxd.type === 'eq' && Array.isArray(fxd.bands)) {
                fxd.bands.forEach((b, i) => {
                  inst.eqData.bands[i] = { ...b };
                  inst.eqData.applyBand(i);
                });
              } else if (fxd.params) {
                Object.assign(inst.params, fxd.params);
                applyFxNodeParams(inst);
              }
              if (fxd.postFader) {
                inst.postFader = true;
                s.rebuildFxChain();
              }
            }
          }

          // Restore mute (must come after vol init)
          if (sd.muted) { s.muted = true; s.updateVol(); }

          samples.set(id, s);
          createTile(s);
          startSample(s);
        } catch (err) {
          console.error('Failed to restore sample:', sd.name, err);
        }
      }

      // Restore LFOs
      // Clear existing LFOs first
      for (const lid of [...lfos.keys()]) removeLfo(lid);
      if (Array.isArray(data.lfos)) {
        for (const ld of data.lfos) {
          const lid = nextLfoId++;
          const lfo = new LFO(lid, ld.x || 400, ld.y || 300);
          lfo.name = ld.name || ('LFO ' + lid);
          if (ld.color) lfo.color = ld.color;
          if (Array.isArray(ld.shape)) lfo.shape = ld.shape.map(p => ({ x: p.x, y: p.y }));
          lfo.rate = ld.rate || 2;
          lfo.gridSync = ld.gridSync || false;
          lfo.subdiv = ld.subdiv || 1;
          lfo._activePreset = ld._activePreset || null;
          // Restore destinations — remap old sampleIds to new ones
          // We assume samples were loaded in the same order, so old id N = new samples in order
          if (Array.isArray(ld.destinations)) {
            // Build old→new id mapping: old sample data order → new sample ids
            const sampleIdList = [...samples.keys()];
            for (const dd of ld.destinations) {
              // Find matching sample by index if sampleId doesn't exist
              const targetId = samples.has(dd.sampleId) ? dd.sampleId : null;
              if (targetId) {
                lfo.addDestination(targetId, dd.param, dd.min, dd.max);
              }
            }
          }
          if (Array.isArray(ld.seqDestinations)) {
            for (const dd of ld.seqDestinations) {
              if (seqs.has(dd.seqId)) lfo.addSeqDestination(dd.seqId, dd.param, dd.min, dd.max);
            }
          }
          lfos.set(lid, lfo);
          createLfoNode(lfo);
        }
      }
      // Restore step sequencers
      for (const sid of [...seqs.keys()]) removeSeq(sid);
      if (Array.isArray(data.seqs)) {
        for (const sd of data.seqs) {
          const sqid = nextSeqId++;
          const seq = new StepSequencer(sqid, sd.x || 400, sd.y || 300);
          seq.name = sd.name || ('Seq ' + sqid);
          if (sd.color) seq.color = sd.color;
          seq.numSteps = sd.numSteps || 16;
          if (Array.isArray(sd.steps)) seq.steps = sd.steps.slice(0, 16);
          seq.gateLength = sd.gateLength ?? 1.0;
          seq.gridSync = sd.gridSync !== false;
          seq.subdiv = sd.subdiv || '16n';
          seq.rate = sd.rate || 0.125;
          seqs.set(sqid, seq);
          createSeqNode(seq);
          // Reconnect destinations
          if (Array.isArray(sd.destinations)) {
            for (const sampleId of sd.destinations) {
              if (samples.has(sampleId)) connectSeqToSample(seq, sampleId);
            }
          }
        }
      }
      updateEmpty();
    }

    // ════════════════════════════════════════════════════
    // PAULSTRETCH ENGINE
    // ════════════════════════════════════════════════════

    const MAX_PS_SECONDS = 600; // 10-minute output cap per channel

    // Self-contained PaulStretch Worker: Cooley-Tukey FFT + overlap-add phase randomisation.
    // Receives: { channels: Float32Array[], ratio: number, winSize: number }
    // Sends:    { type:'progress', pct } | { type:'done', channels: Float32Array[] }
    const PS_WORKER_CODE = `(function(){
      function fft(re, im) {
        const n = re.length;
        for (let i = 1, j = 0; i < n; i++) {
          let bit = n >> 1;
          for (; j & bit; bit >>= 1) j ^= bit;
          j ^= bit;
          if (i < j) {
            let t = re[i]; re[i] = re[j]; re[j] = t;
            t = im[i]; im[i] = im[j]; im[j] = t;
          }
        }
        for (let len = 2; len <= n; len <<= 1) {
          const ang = -2 * Math.PI / len;
          const wRe = Math.cos(ang), wIm = Math.sin(ang);
          for (let i = 0; i < n; i += len) {
            let cRe = 1, cIm = 0;
            for (let j = 0; j < (len >> 1); j++) {
              const uRe = re[i+j], uIm = im[i+j];
              const h = len >> 1;
              const vRe = re[i+j+h]*cRe - im[i+j+h]*cIm;
              const vIm = re[i+j+h]*cIm + im[i+j+h]*cRe;
              re[i+j] = uRe+vRe; im[i+j] = uIm+vIm;
              re[i+j+h] = uRe-vRe; im[i+j+h] = uIm-vIm;
              const nr = cRe*wRe - cIm*wIm;
              cIm = cRe*wIm + cIm*wRe; cRe = nr;
            }
          }
        }
      }
      function ifft(re, im) {
        const n = re.length;
        for (let i = 0; i < n; i++) im[i] = -im[i];
        fft(re, im);
        for (let i = 0; i < n; i++) { re[i] /= n; im[i] = -im[i] / n; }
      }
      function paulstretch(input, ratio, winSize) {
        const halfWin = winSize >> 1;
        const outLen = Math.ceil(input.length * ratio);
        const output = new Float32Array(outLen);
        // Tukey window: (1 - x^2)^1.25  x in [-1, 1]
        const win = new Float32Array(winSize);
        for (let i = 0; i < winSize; i++) {
          const x = (i / (winSize - 1)) * 2 - 1;
          win[i] = Math.pow(Math.max(0, 1 - x * x), 1.25);
        }
        // Precompute per-slot OLA normalisation (sum of win^2 at 50% overlap)
        const normTable = new Float32Array(halfWin);
        for (let i = 0; i < halfWin; i++)
          normTable[i] = win[i]*win[i] + win[i+halfWin]*win[i+halfWin];
        const inputHop = halfWin / ratio;
        const re = new Float32Array(winSize);
        const im = new Float32Array(winSize);
        let inputPos = 0, outputPos = 0, lastPct = 0;
        while (outputPos < outLen) {
          const center = Math.round(inputPos);
          for (let i = 0; i < winSize; i++) {
            const si = center - halfWin + i;
            re[i] = (si >= 0 && si < input.length) ? input[si] * win[i] : 0;
            im[i] = 0;
          }
          fft(re, im);
          // Randomise phases, preserve magnitudes
          for (let i = 0; i <= halfWin; i++) {
            const mag = Math.sqrt(re[i]*re[i] + im[i]*im[i]);
            const ph  = Math.random() * 6.283185307;
            re[i] = mag * Math.cos(ph); im[i] = mag * Math.sin(ph);
          }
          // Hermitian symmetry for real IFFT
          for (let i = halfWin + 1; i < winSize; i++) {
            re[i] =  re[winSize - i];
            im[i] = -im[winSize - i];
          }
          ifft(re, im);
          // Overlap-add with window and OLA normalisation
          for (let i = 0; i < winSize; i++) {
            const oi = outputPos + i;
            if (oi < outLen) {
              const w = win[i];
              const n = normTable[oi % halfWin] || 1;
              output[oi] += re[i] * w / n;
            }
          }
          inputPos += inputHop;
          outputPos += halfWin;
          const pct = Math.min(1, outputPos / outLen);
          if (pct - lastPct >= 0.02) { lastPct = pct; self.postMessage({ type:'progress', pct }); }
        }
        return output;
      }
      self.onmessage = function(e) {
        const { channels, ratio, winSize } = e.data;
        const ws = winSize || 8192;
        const result = channels.map(ch => paulstretch(ch, ratio, ws));
        self.postMessage({ type:'done', channels: result }, result.map(c => c.buffer));
      };
    })();`;

    function buildPsBuffer(s) {
      // Cancel any in-progress render
      if (s._psWorker) { s._psWorker.terminate(); s._psWorker = null; }
      if (s.psStretch <= 1) return;

      // Save which source region we are stretching
      s._psSrcStart = s.loopStart;
      s._psSrcEnd = s.loopEnd;

      const sr = s.raw.sampleRate;
      const startSample = Math.round(s.loopStart * s.duration * sr);
      const endSample = Math.round(s.loopEnd * s.duration * sr);
      const loopLen = Math.max(1, endSample - startSample);

      // Cap ratio so output never exceeds MAX_PS_SECONDS
      const maxSamples = MAX_PS_SECONDS * sr;
      const ratio = Math.min(s.psStretch, maxSamples / loopLen);

      // Extract the loop region for each channel
      const channels = [];
      for (let c = 0; c < s.raw.numberOfChannels; c++) {
        const src = s.raw.getChannelData(c);
        channels.push(src.slice(startSample, endSample));
      }

      // Show loading overlay on tile
      const tile = document.getElementById('t' + s.id);
      if (tile) {
        let ov = tile.querySelector('.tile-ps-loading');
        if (!ov) {
          ov = document.createElement('div');
          ov.className = 'tile-ps-loading';
          ov.innerHTML = '<span class="tile-ps-lbl">PS</span><div class="tile-ps-bar-wrap"><div class="tile-ps-bar"></div></div>';
          tile.appendChild(ov);
        }
        ov.style.display = '';
        const bar = ov.querySelector('.tile-ps-bar');
        if (bar) bar.style.width = '0%';
      }
      s._psRendering = true;
      s._psBuffer = null;
      s._hiPeaks = null;
      s._psPlayingBuffer = false;

      const blob = new Blob([PS_WORKER_CODE], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      const worker = new Worker(url);
      URL.revokeObjectURL(url);
      s._psWorker = worker;

      // Transfer copies so the originals stay usable on the main thread
      const transfers = channels.map(c => c.buffer);
      worker.postMessage({ channels, ratio, winSize: 8192 }, transfers);

      worker.onmessage = function (ev) {
        if (ev.data.type === 'progress') {
          const pct = ev.data.pct;
          const bar = document.querySelector('#t' + s.id + ' .tile-ps-bar');
          if (bar) bar.style.width = Math.round(pct * 100) + '%';
          return;
        }
        if (ev.data.type === 'done') {
          worker.terminate();
          s._psWorker = null;
          s._psRendering = false;

          // Build AudioBuffer from result
          const outCh = ev.data.channels;
          const outLen = outCh[0].length;
          const audioCtx = Tone.context.rawContext;
          const buf = audioCtx.createBuffer(outCh.length, outLen, sr);
          for (let c = 0; c < outCh.length; c++) buf.copyToChannel(outCh[c], c);
          s._psBuffer = buf;
          s._psFadedBuf = null; // new PS buffer — rebuild faded buffer on next play
          s._hiPeaks = null; // recompute from psBuffer

          // Reset loop region to the full PS buffer so handles work on stretched audio
          s.loopStart = 0;
          s.loopEnd = 1;
          s.filePosition = 0;
          s._fadedBuf = null;

          // Hide loading overlay
          const t = document.getElementById('t' + s.id);
          if (t) { const ov = t.querySelector('.tile-ps-loading'); if (ov) ov.style.display = 'none'; }

          refreshTileWave(s);
          // Refresh open card waveform
          if (openCards.has(s.id)) {
            const info = openCards.get(s.id);
            const wc = info.el.querySelector('.card-wave-canvas');
            if (wc) {
              const wrap = info.el.querySelector('.card-wave-wrap');
              const W = (wrap ? wrap.clientWidth : 284) - 20;
              const H = wrap ? wrap.clientHeight : 80;
              wc.width = W; wc.height = H;
            }
            // Trigger a redraw by dispatching a resize-like event
            const drawFn = info._drawWave;
            if (typeof drawFn === 'function') drawFn();
          }

          // Restart playback using the stretched buffer
          if (s.playing) s.play();
        }
      };

      worker.onerror = function (err) {
        console.error('PaulStretch worker error', err);
        s._psRendering = false; s._psWorker = null;
        const t = document.getElementById('t' + s.id);
        if (t) { const ov = t.querySelector('.tile-ps-loading'); if (ov) ov.style.display = 'none'; }
      };
    }

    // ════════════════════════════════════════════════════
    // LFO NODE CREATION & MANAGEMENT
    // ════════════════════════════════════════════════════

    function createLfoNode(lfo) {
      const el = document.createElement('div');
      el.className = 'lfo-node';
      el.id = 'lfo-' + lfo.id;
      el.style.left = (lfo.x - LFO_W / 2) + 'px';
      el.style.top = (lfo.y - LFO_H_MIN / 2) + 'px';
      el.style.borderColor = lfo.color;

      el.innerHTML = `
        <div class="lfo-titlebar" title="Click to collapse/expand">
          <div class="lfo-color-dot"></div>
          <div class="lfo-name">${lfo.name}</div>
          <button class="lfo-dup" title="Duplicate">⧉</button>
          <button class="lfo-remove" title="Remove">🗑</button>
          <button class="lfo-min" title="Minimize">✕</button>
        </div>
        <div class="lfo-shape-wrap">
          <canvas class="lfo-shape-canvas"></canvas>
          <div class="lfo-playhead"></div>
        </div>
        <div class="lfo-min-footer">${lfo.name}</div>
        <div class="lfo-preset-row">
          <button class="lfo-preset-btn" data-preset="sine">SIN</button>
          <button class="lfo-preset-btn" data-preset="square">SQR</button>
          <button class="lfo-preset-btn" data-preset="triangle">TRI</button>
          <button class="lfo-preset-btn" data-preset="random">RND</button>
          <button class="lfo-preset-btn" data-preset="blank">BLNK</button>
        </div>
        <div class="lfo-controls">
          <div class="crow">
            <span class="clbl">Rate</span>
            <div class="cslider lfo-rate-slider">
              <input type="range" class="lfo-rate-input" min="0.1" max="30" step="0.1" value="${lfo.rate}">
              <div class="cslider-thumb"><span class="cslider-lbl">${lfo.rate.toFixed(1)}s</span><input class="cslider-edit" type="text"></div>
            </div>
          </div>
        </div>
        <div class="lfo-grid-row">
          <button class="cbtn lfo-grid-btn" style="flex:0 0 auto;padding:4px 8px;font-size:9px">Grid</button>
          <select class="lfo-subdiv-sel">
            <option value="0.25">4 bars</option>
            <option value="0.333">3 bars</option>
            <option value="0.5">2 bars</option>
            <option value="1" selected>1 bar</option>
            <option value="2">1/2</option>
            <option value="4">1/4</option>
            <option value="8">1/8</option>
            <option value="16">1/16</option>
            <option value="32">1/32</option>
          </select>
        </div>
        <div class="lfo-wire-port" title="Drag to connect to a parameter"></div>
        <div class="lfo-dest-list"></div>
      `;

      const q = sel => el.querySelector(sel);
      q('.lfo-color-dot').style.background = lfo.color;
      q('.lfo-playhead').style.background = lfo.color;

      // ── Shape canvas ──
      const shapeCanvas = q('.lfo-shape-canvas');
      const shapeWrap = q('.lfo-shape-wrap');

      function drawShape() {
        const W = shapeCanvas.clientWidth || 200;
        const H = shapeCanvas.clientHeight || 60;
        shapeCanvas.width = W; shapeCanvas.height = H;
        const ctx = shapeCanvas.getContext('2d');
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

        // Draw grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        for (let i = 1; i < 4; i++) {
          const gy = H * i / 4;
          ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
        }
        for (let i = 1; i < 4; i++) {
          const gx = W * i / 4;
          ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
        }

        // Draw shape
        const pts = lfo.shape;
        if (pts.length >= 2) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(pts[0].x * W, (1 - pts[0].y) * H);
          for (let i = 1; i < pts.length; i++) {
            ctx.lineTo(pts[i].x * W, (1 - pts[i].y) * H);
          }
          ctx.stroke();

          // Fill under curve
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.beginPath();
          ctx.moveTo(pts[0].x * W, H);
          for (const p of pts) ctx.lineTo(p.x * W, (1 - p.y) * H);
          ctx.lineTo(pts[pts.length - 1].x * W, H);
          ctx.closePath();
          ctx.fill();
        }

        // Draw breakpoints
        for (const p of pts) {
          ctx.fillStyle = '#fff';
          ctx.fillRect(p.x * W - 2, (1 - p.y) * H - 2, 5, 5);
        }
      }
      requestAnimationFrame(drawShape);

      // ── Breakpoint editing ──
      let _dragBpIdx = -1;
      shapeWrap.addEventListener('mousedown', e => {
        if (el.classList.contains('collapsed')) return;
        e.stopPropagation();
        const rect = shapeCanvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) / rect.width;
        const my = 1 - (e.clientY - rect.top) / rect.height;

        // Check if clicking near an existing breakpoint
        const pts = lfo.shape;
        let hitIdx = -1;
        for (let i = 0; i < pts.length; i++) {
          const dx = (mx - pts[i].x) * rect.width;
          const dy = (my - pts[i].y) * rect.height;
          if (Math.abs(dx) < 8 && Math.abs(dy) < 8) { hitIdx = i; break; }
        }

        if (e.shiftKey && hitIdx >= 0) {
          // Shift+click removes a breakpoint (not first/last)
          if (hitIdx > 0 && hitIdx < pts.length - 1) {
            pts.splice(hitIdx, 1);
            lfo._activePreset = null;
            updatePresetButtons();
            drawShape();
          }
          return;
        }

        if (hitIdx >= 0) {
          // Drag existing breakpoint
          _dragBpIdx = hitIdx;
          const mm = ev => {
            const nmx = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
            const nmy = Math.max(0, Math.min(1, 1 - (ev.clientY - rect.top) / rect.height));
            // Constrain x: can't go past neighbors
            const prevX = _dragBpIdx > 0 ? pts[_dragBpIdx - 1].x + 0.005 : 0;
            const nextX = _dragBpIdx < pts.length - 1 ? pts[_dragBpIdx + 1].x - 0.005 : 1;
            pts[_dragBpIdx].x = Math.max(prevX, Math.min(nextX, nmx));
            pts[_dragBpIdx].y = nmy;
            lfo._activePreset = null;
            updatePresetButtons();
            drawShape();
          };
          const mu = () => {
            _dragBpIdx = -1;
            document.removeEventListener('mousemove', mm);
            document.removeEventListener('mouseup', mu);
          };
          document.addEventListener('mousemove', mm);
          document.addEventListener('mouseup', mu);
          return;
        }

        // Click on empty space: add a breakpoint
        const newPt = { x: Math.max(0, Math.min(1, mx)), y: Math.max(0, Math.min(1, my)) };
        // Insert sorted by x
        let insertIdx = pts.length;
        for (let i = 0; i < pts.length; i++) {
          if (pts[i].x > newPt.x) { insertIdx = i; break; }
        }
        pts.splice(insertIdx, 0, newPt);
        lfo._activePreset = null;
        updatePresetButtons();
        drawShape();
      });

      // ── Presets ──
      function updatePresetButtons() {
        el.querySelectorAll('.lfo-preset-btn').forEach(btn => {
          btn.classList.toggle('act', btn.dataset.preset === lfo._activePreset);
        });
      }
      el.querySelectorAll('.lfo-preset-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const preset = btn.dataset.preset;
          lfo.shape = LFO_PRESETS[preset]();
          lfo._activePreset = preset;
          updatePresetButtons();
          drawShape();
        });
      });
      updatePresetButtons();

      // ── Rate slider ──
      const rateSlider = q('.lfo-rate-slider');
      const rateInput = q('.lfo-rate-input');
      initCslider(rateSlider, v => parseFloat(v).toFixed(1) + 's');
      rateInput.addEventListener('input', e => {
        lfo.rate = parseFloat(e.target.value);
      });

      // ── Grid sync ──
      const gridBtn = q('.lfo-grid-btn');
      const subdivSel = q('.lfo-subdiv-sel');
      gridBtn.classList.toggle('act', lfo.gridSync);
      subdivSel.value = lfo.subdiv;
      function updateGridUI() {
        const on = lfo.gridSync;
        rateSlider.style.opacity = on ? '0.3' : '1';
        rateSlider.style.pointerEvents = on ? 'none' : 'all';
        subdivSel.style.opacity = on ? '1' : '0.4';
        subdivSel.style.pointerEvents = on ? 'all' : 'none';
      }
      updateGridUI();
      gridBtn.addEventListener('click', e => {
        e.stopPropagation();
        lfo.gridSync = !lfo.gridSync;
        gridBtn.classList.toggle('act', lfo.gridSync);
        updateGridUI();
      });
      subdivSel.addEventListener('change', e => {
        e.stopPropagation();
        lfo.subdiv = parseFloat(e.target.value);
      });

      // ── Wire port drag ──
      q('.lfo-wire-port').addEventListener('mousedown', e => {
        e.stopPropagation();
        e.preventDefault();
        startWireDrag(lfo, e);
      });

      // ── Header buttons ──
      q('.lfo-remove').addEventListener('click', e => {
        e.stopPropagation();
        removeLfo(lfo.id);
      });
      q('.lfo-dup').addEventListener('click', e => {
        e.stopPropagation();
        duplicateLfo(lfo);
      });
      q('.lfo-min').addEventListener('click', e => {
        e.stopPropagation();
        el.classList.toggle('collapsed');
      });

      // ── Titlebar drag & Click to collapse ──
      let titleMoved = false;
      q('.lfo-titlebar').addEventListener('mousedown', e => {
        if (e.target.closest('button')) return;
        e.preventDefault(); e.stopPropagation();
        titleMoved = false;
        const ox = e.clientX, oy = e.clientY;
        const oL = parseInt(el.style.left), oT = parseInt(el.style.top);
        el.classList.add('dragging');
        const mm = ev => {
          const dx = ev.clientX - ox, dy = ev.clientY - oy;
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) titleMoved = true;
          const nl = oL + dx;
          const nt = oT + dy;
          el.style.left = nl + 'px'; el.style.top = nt + 'px';
          lfo.x = nl + LFO_W / 2; lfo.y = nt + LFO_H_MIN / 2;
          updateLfoWires();
        };
        const mu = () => {
          el.classList.remove('dragging');
          document.removeEventListener('mousemove', mm);
          document.removeEventListener('mouseup', mu);
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });
      // Header click to toggle collapse (only if not moved)
      q('.lfo-titlebar').addEventListener('click', e => {
        if (e.target.closest('button')) return;
        if (!titleMoved) {
          e.stopPropagation();
          el.classList.toggle('collapsed');
        }
      });

      // ── Dragging & clicking when collapsed ──
      let minMoved = false;
      el.addEventListener('mousedown', e => {
        if (!el.classList.contains('collapsed')) return;
        e.preventDefault(); e.stopPropagation();
        minMoved = false;
        const ox = e.clientX, oy = e.clientY;
        const oL = parseInt(el.style.left), oT = parseInt(el.style.top);
        el.classList.add('dragging');
        const mm = ev => {
          const dx = ev.clientX - ox, dy = ev.clientY - oy;
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) minMoved = true;
          const nl = oL + dx;
          const nt = oT + dy;
          el.style.left = nl + 'px'; el.style.top = nt + 'px';
          lfo.x = nl + 136 / 2;  // use collapsed width for center tracking
          lfo.y = nt + 56 / 2;
          updateLfoWires();
        };
        const mu = () => {
          el.classList.remove('dragging');
          document.removeEventListener('mousemove', mm);
          document.removeEventListener('mouseup', mu);
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });
      el.addEventListener('click', e => {
        if (!el.classList.contains('collapsed')) return;
        if (!minMoved) el.classList.remove('collapsed');
      });

      // ── Destination list ──
      function updateDestList() {
        const list = q('.lfo-dest-list');
        list.innerHTML = '';
        for (const d of lfo.destinations) {
          const s = samples.get(d.sampleId);
          const pInfo = LFO_PARAM_MAP[d.param];
          if (!s || !pInfo) continue;

          let targetLbl = pInfo.label;
          if (d.fxUid) {
            const inst = s.fxChain.find(i => i.uid === d.fxUid);
            if (inst) {
              const fxName = (s.fxCatalog.find(f => f.id === inst.type)?.name || inst.type).toUpperCase().slice(0, 3);
              targetLbl = `${fxName} · ${pInfo.label}`;
            }
          }

          const item = document.createElement('div');
          item.className = 'lfo-dest-item';
          item.innerHTML = `
            <span class="lfo-dest-name" title="${s.name} · ${targetLbl}">${s.name.substring(0, 8)}: ${targetLbl}</span>
            <input class="lfo-dest-field lfo-dest-min" type="text" value="${d.min}" title="Min">
            <input class="lfo-dest-field lfo-dest-max" type="text" value="${d.max}" title="Max">
            <button class="lfo-dest-unlink" title="Unlink">✕</button>
          `;
          const minF = item.querySelector('.lfo-dest-min');
          const maxF = item.querySelector('.lfo-dest-max');
          minF.addEventListener('change', () => {
            const v = parseFloat(minF.value);
            if (!isNaN(v)) d.min = v;
            else minF.value = d.min;
          });
          maxF.addEventListener('change', () => {
            const v = parseFloat(maxF.value);
            if (!isNaN(v)) d.max = v;
            else maxF.value = d.max;
          });
          [minF, maxF].forEach(f => {
            f.addEventListener('mousedown', e => e.stopPropagation());
            f.addEventListener('click', e => e.stopPropagation());
            f.addEventListener('keydown', e => { if (e.key === 'Enter') f.blur(); e.stopPropagation(); });
          });
          item.querySelector('.lfo-dest-unlink').addEventListener('click', e => {
            e.stopPropagation();
            lfo.removeDestination(d.sampleId, d.param, d.fxUid);
            unlinkParamOverride(d.sampleId, d.param, d.fxUid);
            updateDestList();
            updateLfoWires();
          });
          list.appendChild(item);
        }
        // Seq destinations
        for (const d of lfo.seqDestinations) {
          const seq = seqs.get(d.seqId);
          if (!seq) continue;
          const pLabel = d.param === 'numSteps' ? 'Steps' : 'Gate';
          const item = document.createElement('div');
          item.className = 'lfo-dest-item';
          item.innerHTML = `
            <span class="lfo-dest-name" title="${seq.name} · ${pLabel}">${seq.name.substring(0, 8)}: ${pLabel}</span>
            <input class="lfo-dest-field lfo-dest-min" type="text" value="${d.min}" title="Min">
            <input class="lfo-dest-field lfo-dest-max" type="text" value="${d.max}" title="Max">
            <button class="lfo-dest-unlink" title="Unlink">✕</button>
          `;
          const minF = item.querySelector('.lfo-dest-min');
          const maxF = item.querySelector('.lfo-dest-max');
          minF.addEventListener('change', () => { const v = parseFloat(minF.value); if (!isNaN(v)) d.min = v; else minF.value = d.min; });
          maxF.addEventListener('change', () => { const v = parseFloat(maxF.value); if (!isNaN(v)) d.max = v; else maxF.value = d.max; });
          [minF, maxF].forEach(f => {
            f.addEventListener('mousedown', e => e.stopPropagation());
            f.addEventListener('click', e => e.stopPropagation());
            f.addEventListener('keydown', e => { if (e.key === 'Enter') f.blur(); e.stopPropagation(); });
          });
          item.querySelector('.lfo-dest-unlink').addEventListener('click', e => {
            e.stopPropagation();
            lfo.removeSeqDestination(d.seqId, d.param);
            updateDestList();
            updateLfoWires();
          });
          list.appendChild(item);
        }
      }

      cv.appendChild(el);
      const nodeInfo = { el, drawShape, updateDestList };
      lfoNodes.set(lfo.id, nodeInfo);
      updateLfoWires();
      return nodeInfo;
    }

    // ════════════════════════════════════════════════════
    // STEP SEQUENCER NODE CREATION
    // ════════════════════════════════════════════════════

    function createSeqNode(seq) {
      const el = document.createElement('div');
      el.className = 'seq-node';
      el.id = 'seq-' + seq.id;
      el.style.left = (seq.x - SEQ_W / 2) + 'px';
      el.style.top = (seq.y - 100) + 'px';
      el.style.borderColor = seq.color;
      el.style.setProperty('--seq-color', seq.color);

      el.innerHTML = `
        <div class="seq-titlebar" title="Click to collapse/expand">
          <div class="seq-color-dot"></div>
          <div class="seq-name">${seq.name}</div>
          <button class="seq-dup" title="Duplicate">⧉</button>
          <button class="seq-remove" title="Remove">🗑</button>
          <button class="seq-min" title="Minimize">✕</button>
        </div>
        <div class="seq-mini-grid"></div>
        <div class="seq-min-footer">${seq.name}</div>
        <div class="seq-grid"></div>
        <div class="seq-controls">
          <div class="seq-steps-row">
            <span class="seq-steps-lbl">Steps</span>
            <div class="cslider seq-steps-slider">
              <input type="range" class="seq-steps-input" min="1" max="16" step="1" value="${seq.numSteps}">
              <div class="cslider-thumb"><span class="cslider-lbl">${seq.numSteps}</span><input class="cslider-edit" type="text"></div>
            </div>
          </div>
        </div>
        <div class="seq-mode-row">
          <span class="seq-rate-lbl">Gate</span>
          <div class="cslider seq-gate-slider">
            <input type="range" class="seq-gate-input" min="0" max="1" step="0.001" value="${Math.sqrt(seq.gateLength).toFixed(3)}">
            <div class="cslider-thumb"><span class="cslider-lbl">${Math.round(seq.gateLength * 100)}%</span><input class="cslider-edit" type="text"></div>
          </div>
        </div>
        <div class="seq-grid-row">
          <button class="cbtn seq-grid-btn" style="flex:0 0 auto;padding:4px 8px;font-size:9px">Grid</button>
          <select class="seq-subdiv-sel">
            <option value="1n">1 bar</option>
            <option value="2n">1/2</option>
            <option value="4n">1/4</option>
            <option value="8n">1/8</option>
            <option value="16n" selected>1/16</option>
            <option value="32n">1/32</option>
            <option value="4t">1/4T</option>
            <option value="8t">1/8T</option>
            <option value="16t">1/16T</option>
          </select>
        </div>
        <div class="seq-rate-row">
          <span class="seq-rate-lbl">Rate</span>
          <div class="cslider seq-rate-slider">
            <input type="range" class="seq-rate-input" min="0.04" max="2" step="0.01" value="${seq.rate}">
            <div class="cslider-thumb"><span class="cslider-lbl">${seq.rate.toFixed(2)}s</span><input class="cslider-edit" type="text"></div>
          </div>
        </div>
        <div class="seq-wire-port" title="Drag to connect to a sampler"></div>
        <div class="seq-dest-list"></div>
      `;

      const q = sel => el.querySelector(sel);
      q('.seq-color-dot').style.background = seq.color;

      // ── Build step grid ──
      function buildGrid() {
        const grid = q('.seq-grid');
        const mini = q('.seq-mini-grid');
        grid.innerHTML = '';
        mini.innerHTML = '';
        for (let i = 0; i < 16; i++) {
          const btn = document.createElement('button');
          btn.className = 'seq-step' +
            (seq.steps[i] ? ' act' : '') +
            (i >= seq.numSteps ? ' inactive' : '');
          btn.dataset.step = i;
          btn.addEventListener('click', e => {
            e.stopPropagation();
            seq.steps[i] = !seq.steps[i];
            btn.classList.toggle('act', seq.steps[i]);
            const dot = q(`.seq-mini-grid .seq-mini-step[data-step="${i}"]`);
            if (dot) dot.classList.toggle('act', seq.steps[i]);
          });
          grid.appendChild(btn);

          const dot = document.createElement('div');
          dot.className = 'seq-mini-step' +
            (seq.steps[i] ? ' act' : '') +
            (i >= seq.numSteps ? ' inactive' : '');
          dot.dataset.step = i;
          mini.appendChild(dot);
        }
      }
      buildGrid();

      // ── Step highlight (visual playhead via rAF) ──
      let _displayStep = -1;
      let _animRunning = true;

      function highlightStep(step) {
        const prevBtn = el.querySelector('.seq-grid .seq-step.cur');
        if (prevBtn) prevBtn.classList.remove('cur');
        const curBtn = el.querySelector(`.seq-grid .seq-step[data-step="${step}"]`);
        if (curBtn && !curBtn.classList.contains('inactive')) curBtn.classList.add('cur');

        const prevDot = el.querySelector('.seq-mini-grid .seq-mini-step.cur');
        if (prevDot) prevDot.classList.remove('cur');
        const curDot = el.querySelector(`.seq-mini-grid .seq-mini-step[data-step="${step}"]`);
        if (curDot && !curDot.classList.contains('inactive')) curDot.classList.add('cur');
      }

      (function animLoop() {
        if (!_animRunning) return;
        if (audioReady && seq._scheduleId !== null && isPlaying && seq._seqPhaseTransport !== null) {
          const stepDur = seqStepDurSec(seq);
          if (stepDur > 0) {
            const elapsed = Tone.Transport.seconds - seq._seqPhaseTransport;
            if (elapsed >= 0) {
              const curStep = Math.floor(elapsed / stepDur) % seq.numSteps;
              if (curStep !== _displayStep) {
                _displayStep = curStep;
                highlightStep(curStep);
              }
            }
          }
        } else if ((!isPlaying || seq._seqPhaseTransport === null) && _displayStep !== -1) {
          _displayStep = -1;
          el.querySelectorAll('.seq-step.cur, .seq-mini-step.cur').forEach(e => e.classList.remove('cur'));
        }
        requestAnimationFrame(animLoop);
      })();

      // ── Steps slider ──
      const stepsSlider = q('.seq-steps-slider');
      const stepsInput = q('.seq-steps-input');

      function updateInactiveSteps() {
        el.querySelectorAll('.seq-step').forEach((btn, i) => btn.classList.toggle('inactive', i >= seq.numSteps));
        el.querySelectorAll('.seq-mini-step').forEach((dot, i) => dot.classList.toggle('inactive', i >= seq.numSteps));
        seq.reschedule();
      }

      initCslider(stepsSlider, v => Math.round(parseFloat(v)) + '');
      stepsInput.addEventListener('input', e => {
        e.stopPropagation();
        seq.numSteps = Math.max(1, Math.min(16, Math.round(parseFloat(e.target.value))));
        updateInactiveSteps();
      });

      // Gate length slider
      const gateSlider = q('.seq-gate-slider');
      const gateInput = q('.seq-gate-input');
      // Slider position t (0–1) maps to gate length t² for better low-end resolution
      initCslider(gateSlider, v => { const t = parseFloat(v); return Math.round(t * t * 100) + '%'; });
      gateInput.addEventListener('input', e => { const t = parseFloat(e.target.value); seq.gateLength = t * t; });

      // ── Grid sync ──
      const gridBtn = q('.seq-grid-btn');
      const subdivSel = q('.seq-subdiv-sel');
      const rateRow = q('.seq-rate-row');
      subdivSel.value = seq.subdiv;
      gridBtn.classList.toggle('act', seq.gridSync);

      function updateGridUI() {
        const on = seq.gridSync;
        subdivSel.style.opacity = on ? '1' : '0.4';
        subdivSel.style.pointerEvents = on ? 'all' : 'none';
        rateRow.style.opacity = on ? '0.3' : '1';
        rateRow.style.pointerEvents = on ? 'none' : 'all';
      }
      updateGridUI();

      gridBtn.addEventListener('click', e => {
        e.stopPropagation();
        seq.gridSync = !seq.gridSync;
        gridBtn.classList.toggle('act', seq.gridSync);
        updateGridUI();
        seq.reschedule();
      });
      subdivSel.addEventListener('change', e => {
        e.stopPropagation();
        seq.subdiv = subdivSel.value;
        if (seq.gridSync) seq.reschedule();
      });

      // ── Rate slider (free mode) ──
      const rateSlider = q('.seq-rate-slider');
      const rateInput = q('.seq-rate-input');
      initCslider(rateSlider, v => parseFloat(v).toFixed(2) + 's');
      rateInput.addEventListener('input', e => {
        seq.rate = parseFloat(e.target.value);
        if (!seq.gridSync) seq.reschedule();
      });

      // ── Wire port ──
      q('.seq-wire-port').addEventListener('mousedown', e => {
        e.stopPropagation();
        e.preventDefault();
        startSeqWireDrag(seq, e);
      });

      // ── Destination list ──
      function updateDestList() {
        const list = q('.seq-dest-list');
        list.innerHTML = '';
        for (const sampleId of seq.destinations) {
          const s = samples.get(sampleId);
          if (!s) continue;
          const item = document.createElement('div');
          item.className = 'seq-dest-item';
          item.innerHTML = `
            <span class="seq-dest-name" title="${s.name}">${s.name.substring(0, 14)}</span>
            <button class="seq-dest-unlink" title="Disconnect">✕</button>
          `;
          item.querySelector('.seq-dest-unlink').addEventListener('click', e => {
            e.stopPropagation();
            disconnectSeqFromSample(sampleId);
          });
          list.appendChild(item);
        }
      }
      updateDestList();

      // ── Header buttons ──
      q('.seq-remove').addEventListener('click', e => { e.stopPropagation(); removeSeq(seq.id); });
      q('.seq-dup').addEventListener('click', e => { e.stopPropagation(); duplicateSeq(seq); });
      q('.seq-min').addEventListener('click', e => { e.stopPropagation(); el.classList.toggle('collapsed'); });

      // ── Titlebar drag & collapse ──
      let titleMoved = false;
      q('.seq-titlebar').addEventListener('mousedown', e => {
        if (e.target.closest('button')) return;
        e.preventDefault(); e.stopPropagation();
        titleMoved = false;
        const ox = e.clientX, oy = e.clientY;
        const oL = parseInt(el.style.left), oT = parseInt(el.style.top);
        el.classList.add('dragging');
        const mm = ev => {
          const dx = ev.clientX - ox, dy = ev.clientY - oy;
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) titleMoved = true;
          el.style.left = (oL + dx) + 'px'; el.style.top = (oT + dy) + 'px';
          seq.x = oL + dx + SEQ_W / 2; seq.y = oT + dy;
          updateLfoWires();
        };
        const mu = () => {
          el.classList.remove('dragging');
          document.removeEventListener('mousemove', mm);
          document.removeEventListener('mouseup', mu);
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });
      q('.seq-titlebar').addEventListener('click', e => {
        if (e.target.closest('button')) return;
        if (!titleMoved) { e.stopPropagation(); el.classList.toggle('collapsed'); }
      });

      // ── Collapsed state: drag & click to expand ──
      let minMoved = false;
      el.addEventListener('mousedown', e => {
        if (!el.classList.contains('collapsed')) return;
        e.preventDefault(); e.stopPropagation();
        minMoved = false;
        const ox = e.clientX, oy = e.clientY;
        const oL = parseInt(el.style.left), oT = parseInt(el.style.top);
        el.classList.add('dragging');
        const mm = ev => {
          const dx = ev.clientX - ox, dy = ev.clientY - oy;
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) minMoved = true;
          el.style.left = (oL + dx) + 'px'; el.style.top = (oT + dy) + 'px';
          seq.x = oL + dx + 136 / 2; seq.y = oT + dy;
          updateLfoWires();
        };
        const mu = () => {
          el.classList.remove('dragging');
          document.removeEventListener('mousemove', mm);
          document.removeEventListener('mouseup', mu);
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });
      el.addEventListener('click', e => {
        if (!el.classList.contains('collapsed')) return;
        if (!minMoved) el.classList.remove('collapsed');
      });

      cv.appendChild(el);
      const nodeInfo = { el, stopAnim: () => { _animRunning = false; }, updateDestList };
      seqNodes.set(seq.id, nodeInfo);
      seq.schedule();
      return nodeInfo;
    }

    // ── Seq connect / disconnect ──
    function connectSeqToSample(seq, sampleId) {
      // If already controlled by another seq, remove that link first
      if (sampleSeqMap.has(sampleId)) {
        const oldSeqId = sampleSeqMap.get(sampleId);
        const oldSeq = seqs.get(oldSeqId);
        if (oldSeq) {
          oldSeq.removeDestination(sampleId);
          seqNodes.get(oldSeqId)?.updateDestList();
        }
        sampleSeqMap.delete(sampleId);
      }
      seq.addDestination(sampleId);
      sampleSeqMap.set(sampleId, seq.id);
      // Stop sample's internal playback — sequencer takes over
      const s = samples.get(sampleId);
      if (s instanceof Sample) {
        s.stop();
        s.playing = false;
        s._renderTile();
        // Mark tile visually
        const tile = document.getElementById('t' + sampleId);
        if (tile) {
          tile.classList.add('seq-controlled');
          tile.style.setProperty('--seq-ctrl-color', seq.color);
        }
      }
      seqNodes.get(seq.id)?.updateDestList();
      updateLfoWires();
    }

    function disconnectSeqFromSample(sampleId) {
      const seqId = sampleSeqMap.get(sampleId);
      if (seqId === undefined) return;
      const seq = seqs.get(seqId);
      if (seq) {
        seq.removeDestination(sampleId);
        seqNodes.get(seqId)?.updateDestList();
      }
      sampleSeqMap.delete(sampleId);
      // Remove tile indicator
      const tile = document.getElementById('t' + sampleId);
      if (tile) {
        tile.classList.remove('seq-controlled');
        tile.style.removeProperty('--seq-ctrl-color');
      }
      // Restart sample's internal playback
      const s = samples.get(sampleId);
      if (s instanceof Sample && audioReady && isPlaying) startSample(s);
      updateLfoWires();
    }

    // ── Wire drag system ──
    function startWireDrag(lfo, startEvent) {
      const wiresSvg = document.getElementById('lfo-wires');
      const tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      tempLine.classList.add('lfo-wire-temp');
      wiresSvg.appendChild(tempLine);

      const port = lfoNodes.get(lfo.id)?.el.querySelector('.lfo-wire-port');
      const portRect = port.getBoundingClientRect();
      const sx = portRect.left + portRect.width / 2;
      const sy = portRect.top + portRect.height / 2;

      // Highlight potential targets: sample card sliders + seq param sliders
      document.querySelectorAll('.sample-card .cslider').forEach(sl => {
        sl.style.outline = '1px dashed rgba(255,255,255,0.2)';
      });
      document.querySelectorAll('.seq-node .seq-steps-slider, .seq-node .seq-gate-slider').forEach(sl => {
        sl.style.outline = '1px dashed rgba(255,255,255,0.2)';
      });

      const mm = ev => {
        const ex = ev.clientX;
        const ey = ev.clientY;
        const cx1 = sx, cy1 = sy + 30;
        const cx2 = ex, cy2 = ey - 30;
        tempLine.setAttribute('d', `M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}`);
      };

      const mu = ev => {
        document.removeEventListener('mousemove', mm);
        document.removeEventListener('mouseup', mu);
        tempLine.remove();
        // Remove highlights
        document.querySelectorAll('.sample-card .cslider').forEach(sl => { sl.style.outline = ''; });
        document.querySelectorAll('.seq-node .seq-steps-slider, .seq-node .seq-gate-slider').forEach(sl => { sl.style.outline = ''; });

        // Check if dropped on a target
        const target = document.elementFromPoint(ev.clientX, ev.clientY);
        if (!target) return;
        const sliderWrap = target.closest('.cslider');
        const eqCanvas = target.classList.contains('card-eq-canvas') ? target : target.closest('.card-eq-canvas');
        if (!sliderWrap && !eqCanvas) return;

        // ── Seq param target ──
        const seqNodeEl = sliderWrap?.closest('.seq-node');
        if (seqNodeEl) {
          const native = sliderWrap.querySelector('input[type=range]');
          if (!native) return;
          let seqParamInfo = null;
          for (const cls of native.classList) {
            if (SEQ_PARAM_MAP[cls]) { seqParamInfo = SEQ_PARAM_MAP[cls]; break; }
          }
          if (!seqParamInfo) return;
          const seqId = parseInt(seqNodeEl.id.replace('seq-', ''));
          if (isNaN(seqId) || !seqs.has(seqId)) return;
          // Remove from any existing LFO targeting this seq param
          for (const [, existLfo] of lfos) {
            if (existLfo.seqDestinations.find(d => d.seqId === seqId && d.param === seqParamInfo.param)) {
              existLfo.removeSeqDestination(seqId, seqParamInfo.param);
              lfoNodes.get(existLfo.id)?.updateDestList();
            }
          }
          lfo.addSeqDestination(seqId, seqParamInfo.param, seqParamInfo.min, seqParamInfo.max);
          lfoNodes.get(lfo.id)?.updateDestList();
          updateLfoWires();
          return;
        }

        const cardEl = (sliderWrap || eqCanvas).closest('.sample-card');
        if (!cardEl) return;

        let paramClass = null;
        if (sliderWrap) {
          const native = sliderWrap.querySelector('input[type=range]');
          if (native) {
            for (const cls of native.classList) {
              if (LFO_PARAM_MAP[cls]) { paramClass = cls; break; }
            }
          }
        }

        // Drop on EQ canvas?
        if (!paramClass && eqCanvas) {
          const rect = eqCanvas.getBoundingClientRect();
          const mx = ev.clientX - rect.left;
          const bandWidth = rect.width / 5;
          const bandIdx = Math.floor(mx / bandWidth);
          const eqParams = ['eq-hp-freq', 'eq-pk1-freq', 'eq-pk2-freq', 'eq-pk3-freq', 'eq-lp-freq'];
          paramClass = eqParams[Math.max(0, Math.min(4, bandIdx))];
        }

        if (!paramClass) return;

        // Determine FX UID if it's an FX or EQ in an FX panel
        const fxPanel = sliderWrap ? sliderWrap.closest('.fx-panel') : target.closest('.fx-panel');
        const fxUid = fxPanel ? parseInt(fxPanel.dataset.fxUid) : null;

        // Find the sample
        const sampleId = findSampleIdFromCard(cardEl);
        if (!sampleId) return;

        // Check not already linked from another LFO
        const existing = isParamModulated(sampleId, paramClass, fxUid);
        if (existing) {
          existing.removeDestination(sampleId, paramClass, fxUid);
          const existNode = lfoNodes.get(existing.id);
          if (existNode) existNode.updateDestList();
        }

        const pInfo = LFO_PARAM_MAP[paramClass];
        lfo.addDestination(sampleId, paramClass, pInfo.min, pInfo.max, fxUid);
        applyParamOverride(sampleId, paramClass, lfo, fxUid);
        lfoNodes.get(lfo.id)?.updateDestList();
        updateLfoWires();
      };

      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', mu);
    }

    function startSeqWireDrag(seq, startEvent) {
      const wiresSvg = document.getElementById('lfo-wires');
      const tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      tempLine.classList.add('seq-wire-temp');
      tempLine.style.stroke = seq.color;
      wiresSvg.appendChild(tempLine);

      const port = seqNodes.get(seq.id)?.el.querySelector('.seq-wire-port');
      const portRect = port.getBoundingClientRect();
      const sx = portRect.left + portRect.width / 2;
      const sy = portRect.top + portRect.height / 2;

      // Highlight potential targets: tiles and open sample cards
      document.querySelectorAll('.tile').forEach(t => {
        t.style.outline = '2px dashed rgba(255,255,255,0.3)';
      });
      document.querySelectorAll('.sample-card').forEach(c => {
        c.style.outline = '2px dashed rgba(255,255,255,0.3)';
      });

      const mm = ev => {
        const ex = ev.clientX, ey = ev.clientY;
        const cx1 = sx, cy1 = sy + 40;
        const cx2 = ex, cy2 = ey - 40;
        tempLine.setAttribute('d', `M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}`);
      };

      const mu = ev => {
        document.removeEventListener('mousemove', mm);
        document.removeEventListener('mouseup', mu);
        tempLine.remove();
        document.querySelectorAll('.tile').forEach(t => { t.style.outline = ''; });
        document.querySelectorAll('.sample-card').forEach(c => { c.style.outline = ''; });

        const target = document.elementFromPoint(ev.clientX, ev.clientY);
        if (!target) return;

        // Check open sample card first, then tile
        const card = target.closest('.sample-card');
        if (card) {
          const sampleId = findSampleIdFromCard(card);
          if (sampleId !== null && samples.has(sampleId)) connectSeqToSample(seq, sampleId);
          return;
        }
        const tile = target.closest('.tile');
        if (!tile) return;
        const sampleId = parseInt(tile.id.slice(1));
        if (isNaN(sampleId) || !samples.has(sampleId)) return;
        connectSeqToSample(seq, sampleId);
      };

      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', mu);
    }

    function findSampleIdFromCard(cardEl) {
      for (const [id, info] of openCards) {
        if (info.el === cardEl) return id;
      }
      return null;
    }

    // ── Wire rendering ──
    // SVG is position:fixed at (0,0) so all coordinates are raw viewport coords
    function updateLfoWires() {
      const wiresSvg = document.getElementById('lfo-wires');
      wiresSvg.querySelectorAll('.lfo-wire-line').forEach(w => w.remove());

      // ── Build SVG mask: white everywhere, black over each card ──
      let defs = wiresSvg.querySelector('defs');
      if (!defs) {
        defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        wiresSvg.insertBefore(defs, wiresSvg.firstChild);
      }
      let mask = defs.querySelector('#wire-card-mask');
      if (!mask) {
        mask = document.createElementNS('http://www.w3.org/2000/svg', 'mask');
        mask.id = 'wire-card-mask';
        mask.setAttribute('maskUnits', 'userSpaceOnUse');
        mask.setAttribute('x', '-9999');
        mask.setAttribute('y', '-9999');
        mask.setAttribute('width', '19998');
        mask.setAttribute('height', '19998');
        defs.appendChild(mask);
      }
      mask.innerHTML = '';
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', '-9999'); bg.setAttribute('y', '-9999');
      bg.setAttribute('width', '19998'); bg.setAttribute('height', '19998');
      bg.setAttribute('fill', 'white');
      mask.appendChild(bg);
      document.querySelectorAll('.sample-card, .lfo-node').forEach(cardEl => {
        const r = cardEl.getBoundingClientRect();
        const mr = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        mr.setAttribute('x', r.left);
        mr.setAttribute('y', r.top);
        mr.setAttribute('width', r.width);
        mr.setAttribute('height', r.height);
        mr.setAttribute('fill', 'black');
        mask.appendChild(mr);
      });

      for (const [, lfo] of lfos) {
        const nodeInfo = lfoNodes.get(lfo.id);
        if (!nodeInfo) continue;
        const port = nodeInfo.el.querySelector('.lfo-wire-port');
        if (!port) continue;
        // When collapsed the port is display:none — use the node's own center instead
        let sx, sy;
        if (nodeInfo.el.classList.contains('collapsed')) {
          const elRect = nodeInfo.el.getBoundingClientRect();
          sx = elRect.left + elRect.width / 2;
          sy = elRect.top + elRect.height / 2;
        } else {
          const portRect = port.getBoundingClientRect();
          sx = portRect.left + portRect.width / 2;
          sy = portRect.top + portRect.height / 2;
        }

        for (const d of lfo.destinations) {
          // Find the target slider — works whether card is open or not
          const cardInfo = openCards.get(d.sampleId);
          if (!cardInfo) continue;

          let targetEl = null;
