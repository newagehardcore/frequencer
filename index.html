<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FREQUENCER</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tiles.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/lfo.css">
  <link rel="stylesheet" href="css/synth.css">
  <link rel="stylesheet" href="css/drums.css">
</head>

<body>

  <input type="file" id="file-input" multiple accept="audio/*" style="display:none">
  <input type="file" id="project-input" accept=".json" style="display:none">



  <!-- DROP OVERLAY -->
  <div id="drop-overlay">
    <div id="drop-box">
      <h2>Drop Audio Files</h2>
      <p>WAV · MP3 · OGG · FLAC · AIFF · M4A · Files or Folders</p>
    </div>
  </div>

  <!-- HEADER BAR -->
  <div id="hdr">
    <div id="hdr-left">
      <div id="logo">FREQUENCER</div>
      <button id="open-btn">Open</button>
      <button id="save-btn">Save</button>
    </div>
    <div id="hdr-right">
      <button class="hdr-add-btn" id="btn-add-sampler" title="Add Sampler">+ Sampler</button>
      <button class="hdr-add-btn" id="btn-add-synth" title="Add Synth">+ Synth</button>
      <button class="hdr-add-btn" id="btn-add-drums" title="Add Drum Machine">+ Drum Machine</button>
      <button class="hdr-add-btn" id="btn-add-riff" title="Add Riff Sequencer">+ Riff</button>
      <button class="hdr-add-btn" id="btn-add-chords" title="Add Chords">+ Chords</button>
      <button class="hdr-add-btn" id="btn-add-lfo" title="Add LFO Modulator">+ LFO</button>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="cv">
    <div id="cv-world"></div>
    <div id="empty" class="gone"></div>
    <canvas id="master-vu" width="40" height="200"></canvas>
    <div id="sample-list"></div>
  </div>
  <!-- Wire SVG lives at body level so it can stack above fixed sample cards -->
  <svg id="lfo-wires"></svg>

  <!-- REC DOWNLOAD MODAL -->
  <div id="rec-modal">
    <div id="rec-modal-box">
      <div id="rec-modal-title">Recording Complete</div>
      <div id="rec-modal-sub">What would you like to download?</div>
      <div id="rec-modal-btns">
        <button class="rec-mbtn primary" id="rec-dl-both">Both — Mix + Stems ZIP</button>
        <button class="rec-mbtn" id="rec-dl-mix">Stereo Mix only</button>
        <button class="rec-mbtn" id="rec-dl-stems">Stems ZIP only</button>
        <button class="rec-mbtn" id="rec-dl-midi" style="display:none">MIDI Files</button>
        <button class="rec-mbtn cancel" id="rec-dl-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <input type="file" id="syx-input" accept=".syx" style="display:none">

  <!-- FOOTER -->
  <div id="ftr">
    <div class="fsec">
      <button class="tbtn" id="btn-play">
        <svg viewBox="0 0 12 12" fill="currentColor">
          <polygon points="2,1 11,6 2,11" />
        </svg>
      </button>
      <button class="tbtn" id="btn-stop">
        <svg viewBox="0 0 12 12" fill="currentColor">
          <rect x="1" y="1" width="10" height="10" />
        </svg>
      </button>
    </div>
    <div class="fsec" style="gap:8px">
      <button class="tbtn" id="btn-rec" title="Record stems + mix">
        <svg viewBox="0 0 12 12" fill="currentColor">
          <circle cx="6" cy="6" r="4.5" />
        </svg>
      </button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div class="flbl">Rec</div>
        <div id="rec-timer">--:--</div>
      </div>
    </div>
    <div class="fsec">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div class="flbl">BPM</div>
        <div id="bpm-val">120</div>
      </div>
    </div>
    <div class="fsec" style="gap:8px">
      <button class="tbtn" id="tog-metro">Metro</button>
      <div id="metro-dot"></div>
    </div>
    <div class="fsec" id="ftr-transpose">
      <div class="flbl">Transpose</div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="tbtn" id="btn-trans-dn" style="width:18px;height:18px;min-width:0;font-size:14px;line-height:1">−</button>
        <span id="trans-val" style="font-size:11px;min-width:28px;text-align:center;font-variant-numeric:tabular-nums">0</span>
        <button class="tbtn" id="btn-trans-up" style="width:18px;height:18px;min-width:0;font-size:14px;line-height:1">+</button>
      </div>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/sequencers.js"></script>
  <script src="js/audio-unlock.js"></script>
  <script src="js/granular.js"></script>
  <script src="js/sample.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/instruments.js"></script>
  <script src="js/tile-ui.js"></script>
  <script src="js/phloop.js"></script>
  <script src="js/import.js"></script>
  <script src="js/playback.js"></script>
  <script src="js/ui-utils.js"></script>
  <script src="js/synth-cards.js"></script>
  <script src="js/sample-cards.js"></script>
  <script src="js/transport.js"></script>
  <script src="js/recording.js"></script>
  <script src="js/save-load.js"></script>
  <script src="js/paulstretch.js"></script>
  <script src="js/lfo-nodes.js"></script>
  <script src="js/riff-nodes.js"></script>
  <script src="js/chords-nodes.js"></script>
  <script src="js/wiring.js"></script>
  <script src="js/events.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
