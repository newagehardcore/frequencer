          this._cancelGrid();
          this._stopPlayer();
          this.playGrid();
        } else {
          this.play();
        }
      }

      // Set file position (normalized 0..1), restarting on the next loop wrap boundary
      setFilePosition(norm) {
        clearTimeout(this._filePosTimer);
        this._pendingRestart = false;
        this.filePosition = Math.max(0, Math.min(this.loopEnd - 0.001 / Math.max(0.001, this.duration), norm));
        if (!this.playing) return;

        if (this.gridSync) return; // fire() reads _revFilePos fresh each tick — no restart needed

        // Non-grid: flag a restart to fire at the next loop wrap (detected in playheadPos)
        this._pendingRestart = true;
        // Safety-net: fire a fallback if the RAF-based detection somehow misses the wrap
        const pos = this.playheadPos();
        const fwd = pos !== null ? (this.reversed ? 1 - pos : pos) : 1;
        const remaining = Math.max(0, (1 - fwd) * this.lenSec / this._pbRate);
        this._filePosTimer = setTimeout(() => {
          if (this.playing && !this.gridSync && this._pendingRestart) {
            this._pendingRestart = false;
            this.play();
          }
        }, remaining * 1000 + 300); // generous buffer so RAF fires first
      }

      dispose() {
        this.stop();
        setTimeout(() => {
          try { this.player.dispose(); } catch (e) { }
          try { this.xfPlayer.dispose(); } catch (e) { }
          try { this.fadeGain.dispose(); } catch (e) { }
          try { this.clipGain.dispose(); } catch (e) { }
          try { this.xfGain.dispose(); } catch (e) { }
          try { this.ps.dispose(); } catch (e) { }
          if (this.eqFilters) this.eqFilters.forEach(f => { try { f.dispose(); } catch (e) { } });
          try { this.pan.dispose(); } catch (e) { }
          try { this.vol.dispose(); } catch (e) { }
          try { this.meter.dispose(); } catch (e) { }
        }, 300);
      }

      computePeaks(bins) {
        const ch = this.raw.getChannelData(0);
        const bsz = Math.max(1, Math.floor(ch.length / bins));
        const p = new Float32Array(bins);
        for (let i = 0; i < bins; i++) {
          let mx = 0, off = i * bsz;
          for (let j = 0; j < bsz; j++) {
            const v = Math.abs(ch[off + j] || 0);
            if (v > mx) mx = v;
          }
          p[i] = mx;
        }
        this.peaks = p;
        return p;
      }

      getHiResPeaks() {
        if (this._hiPeaks) return this._hiPeaks;
        const bins = 8192;
        const buf = (this.psStretch > 1 && this._psBuffer) ? this._psBuffer : this.raw;
        const ch = buf.getChannelData(0);
        const bsz = Math.max(1, Math.floor(ch.length / bins));
        const p = new Float32Array(bins);
        for (let i = 0; i < bins; i++) {
          let mx = 0, off = i * bsz;
          for (let j = 0; j < bsz; j++) {
            const v = Math.abs(ch[off + j] || 0);
            if (v > mx) mx = v;
          }
          p[i] = mx;
        }
        this._hiPeaks = p;
        return p;
      }

      applyEqBand(i) {
        const f = this.eqFilters[i], b = this.eqBands[i];
        f.frequency.value = b.freq;
        f.Q.value = b.q;
        if (b.type === 'peaking') f.gain.value = b.gain || 0;
      }

      rebuildFxChain() {
        try { this.eqFilters[4].disconnect(); } catch (e) { }
        try { this.pan.disconnect(); } catch (e) { }
        try { this.vol.disconnect(); } catch (e) { }
        for (const inst of this.fxChain) {
          try { (inst.outputNode || inst.node).disconnect(); } catch (e) { }
        }
        const preFx = this.fxChain.filter(i => !i.postFader);
        const postFx = this.fxChain.filter(i => i.postFader);
        let prev = this.eqFilters[4];
        for (const inst of preFx) {
          if (!inst.node) continue;
          prev.connect(inst.node);
          prev = inst.outputNode || inst.node;
        }
        prev.connect(this.pan);
        this.pan.connect(this.vol);
        prev = this.vol;
        for (const inst of postFx) {
          if (!inst.node) continue;
          prev.connect(inst.node);
          prev = inst.outputNode || inst.node;
        }
        prev.connect(masterSamplesGain);
        this.vol.connect(this.meter);
      }

      _fxDefaultParams(type) {
        const d = {
          reverb: { decay: 2.5, preDelay: 0.01, wet: 0.4 },
          delay: { delayTime: 0.25, feedback: 0.35, wet: 0.4 },
          tremolo: { frequency: 4, depth: 0.7, wet: 1 },
          dist: { distortion: 0.4, wet: 0.8 },
          chorus: { frequency: 1.5, delayTime: 3.5, depth: 0.7, wet: 0.5 },
          phaser: { frequency: 0.5, octaves: 3, baseFrequency: 350, wet: 0.6 },
          bitcrush: { bits: 8, wet: 0.8 },
        };
        return { ...(d[type] || {}) };
      }

      _createFxNode(type, params) {
        switch (type) {
          case 'reverb': return new Tone.Reverb({ decay: params.decay, preDelay: params.preDelay, wet: params.wet });
          case 'delay': return new Tone.FeedbackDelay({ delayTime: params.delayTime, feedback: params.feedback, wet: params.wet });
          case 'tremolo': return new Tone.Tremolo({ frequency: params.frequency, depth: params.depth, wet: params.wet }).start();
          case 'dist': return new Tone.Distortion({ distortion: params.distortion, wet: params.wet });
          case 'chorus': return new Tone.Chorus({ frequency: params.frequency, delayTime: params.delayTime, depth: params.depth, wet: params.wet }).start();
          case 'phaser': return new Tone.Phaser({ frequency: params.frequency, octaves: params.octaves, baseFrequency: params.baseFrequency, wet: params.wet });
          case 'bitcrush': return new Tone.BitCrusher({ bits: params.bits, wet: params.wet });
          default: return null;
        }
      }

      _createEqInstance() {
        const defaultBands = [
          { type: 'highpass', freq: 20, q: 0.707 },
          { type: 'peaking', freq: 200, gain: 0, q: 1 },
          { type: 'peaking', freq: 1000, gain: 0, q: 1 },
          { type: 'peaking', freq: 8000, gain: 0, q: 1 },
          { type: 'lowpass', freq: 22050, q: 0.707 },
        ];
        const bands = defaultBands.map(b => ({ ...b }));
        const filters = bands.map(b => {
          const f = new Tone.Filter({ type: b.type, frequency: b.freq, Q: b.q });
          if (b.type === 'peaking') f.gain.value = 0;
          return f;
        });
        for (let i = 3; i >= 0; i--) filters[i].connect(filters[i + 1]);
        const applyBand = (i) => {
          const f = filters[i], b = bands[i];
          f.frequency.value = b.freq;
          f.Q.value = b.q;
          if (b.type === 'peaking') f.gain.value = b.gain || 0;
        };
        return { node: filters[0], outputNode: filters[4], bands, filters, applyBand };
      }

      addFxInstance(type) {
        let inst;
        if (type === 'eq') {
          const eq = this._createEqInstance();
          inst = { uid: ++this._fxUidCounter, type: 'eq', node: eq.node, outputNode: eq.outputNode, eqData: eq, params: {}, postFader: true };
        } else {
          const params = this._fxDefaultParams(type);
          const node = this._createFxNode(type, params);
          if (!node) return null;
          inst = { uid: ++this._fxUidCounter, type, node, params, postFader: true };
        }
        this.fxChain.push(inst);
        this.rebuildFxChain();
        return inst;
      }

      removeFxInstance(uid) {
        const idx = this.fxChain.findIndex(i => i.uid === uid);
        if (idx < 0) return;
        const inst = this.fxChain[idx];
        if (inst.eqData) {
          for (const f of inst.eqData.filters) { try { f.disconnect(); f.dispose(); } catch (e) { } }
        } else {
          try { inst.node.disconnect(); } catch (e) { }
          try { inst.node.dispose(); } catch (e) { }
        }
        this.fxChain.splice(idx, 1);
        this.rebuildFxChain();
      }

      _renderTile() {
        const tile = document.getElementById('t' + this.id);
        if (!tile) return;
        tile.style.setProperty('--card-color', this.color);
        tile.classList.toggle('playing', this.playing);
        tile.classList.toggle('muted', this.muted);
        tile.classList.toggle('grid-on', this.gridSync);

        const mbtn = tile.querySelector('.tile-mbtn');
        if (mbtn) mbtn.classList.toggle('mute-on', this.muted);

        if (openCards.has(this.id)) {
          const card = openCards.get(this.id).el;
          const cardM = card.querySelector('.card-mute-btn');
          if (cardM) cardM.classList.toggle('mute-on', this.muted);
        }

        // Color-aware border: full color when playing, dimmed at rest
        tile.style.borderColor = this.playing ? this.color : (this.color + '55');
        refreshSoloVis();
      }
    }

    // ════════════════════════════════════════════════════
    // TILE CREATION & WAVEFORM
    // ════════════════════════════════════════════════════
    function createTile(s) {
      const t = document.createElement('div');
      t.className = 'tile';
      t.id = 't' + s.id;
      t.style.left = (s.x - TW / 2) + 'px';
      t.style.top = (s.y - TH / 2) + 'px';
      t.style.setProperty('--col', s.color);
      t.style.borderColor = s.color + '55'; // dim border at rest

      const wc = document.createElement('canvas');
      wc.className = 'tile-canvas';
      wc.width = TW; wc.height = TH;
      t.appendChild(wc);

      const vu = document.createElement('canvas');
      vu.className = 'tile-vu-canvas';
      vu.width = 10; vu.height = 42;
      t.appendChild(vu);

      const ph = document.createElement('div');
      ph.className = 'tile-ph';
      ph.id = 'ph' + s.id;
      ph.style.background = s.color;
      t.appendChild(ph);

      const gb = document.createElement('div');
      gb.className = 'tile-gbadge';
      gb.textContent = 'GRID';
      t.appendChild(gb);

      const lb = document.createElement('div');
      lb.className = 'tile-lbl';
      lb.textContent = s.name;
      t.appendChild(lb);

      const mbtn = document.createElement('button');
      mbtn.className = 'tile-mbtn';
      mbtn.textContent = 'M';
      mbtn.title = 'Mute';
      if (s.muted) mbtn.classList.add('mute-on');
      mbtn.onclick = (e) => {
        e.stopPropagation();
        s.muted = !s.muted;
        s.vol.volume.value = s._effectiveDb();
        s._renderTile();
      };
      t.appendChild(mbtn);

      const sbtn = document.createElement('button');
      sbtn.className = 'tile-sbtn';
      sbtn.textContent = 'S';
      sbtn.title = 'Solo';
      if (soloId === s.id) sbtn.classList.add('solo-on');
      sbtn.onclick = (e) => {
        e.stopPropagation();
        soloId = (soloId === s.id) ? null : s.id;
        applyAllVols();
        refreshSoloVis();
      };
      t.appendChild(sbtn);

      requestAnimationFrame(() => drawTileWave(wc, s));

      makeDraggable(t, s);

      // Single click → open card, or close if already open
      t.addEventListener('click', (e) => {
        if (!t._dragged) {
          if (openCards.has(s.id)) closeCard(s.id);
          else openCard(s.id, t);
        }
      });

      // Double-click → play/stop
      t.addEventListener('dblclick', (e) => {
        e.preventDefault();
        togglePlay(s.id);
      });

      // Right-click → also open card (same as click)
      t.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        openCard(s.id, t);
      });

      cv.appendChild(t);
      updateEmpty();
      return t;
    }

    function drawTileWave(canvas, s) {
      const ctx = canvas.getContext('2d');
      const W = TW, H = TH;
      ctx.clearRect(0, 0, W, H);

      const labelH = 14;
      const drawH = H - labelH;
      const mid = drawH / 2;

      const peaks = s.getHiResPeaks();
      const startIdx = s.loopStart * peaks.length;
      const endIdx = s.loopEnd * peaks.length;
      const range = endIdx - startIdx;
      const step = range / W;

      const clipScale = Math.pow(10, s.clipGainDb / 20);
      for (let i = 0; i < W; i++) {
        const binStart = Math.floor(startIdx + i * step);
        const binEnd = Math.ceil(startIdx + (i + 1) * step);
        let amp = 0;
        for (let b = binStart; b < binEnd && b < peaks.length; b++) {
          if (peaks[b] > amp) amp = peaks[b];
        }
        const scaledAmp = Math.min(1, amp * clipScale);
        const barH = Math.max(1, scaledAmp * drawH * 0.85);
        ctx.fillStyle = `rgba(255,255,255,${0.25 + scaledAmp * 0.75})`;
        ctx.fillRect(i, mid - barH / 2, 1, barH);
      }

      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(0, mid, W, 1);

      // ── Fade overlays on tile ──
      const loopRange = Math.max(0.001, s.loopEnd - s.loopStart);
      const _tileDur = s._activeDur;
      if (s.attackTime > 0) {
        const atkPx = Math.min(W * 0.45, (s.attackTime / _tileDur) / loopRange * W);
        if (atkPx > 0) {
          const g = ctx.createLinearGradient(0, 0, atkPx, 0);
          g.addColorStop(0, 'rgba(0,0,0,0.75)');
          g.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, atkPx, drawH);
        }
      }
      if (s.releaseTime > 0) {
        const relPx = Math.min(W * 0.45, (s.releaseTime / _tileDur) / loopRange * W);
        if (relPx > 0) {
          const g = ctx.createLinearGradient(W - relPx, 0, W, 0);
          g.addColorStop(0, 'rgba(0,0,0,0)');
          g.addColorStop(1, 'rgba(0,0,0,0.75)');
          ctx.fillStyle = g;
          ctx.fillRect(W - relPx, 0, relPx, drawH);
        }
      }
      if (s.crossfadeTime > 0) {
        const xfdPx = Math.min(W * 0.45, (s.crossfadeTime / _tileDur) / loopRange * W);
        if (xfdPx > 0) {
          const ge = ctx.createLinearGradient(W - xfdPx, 0, W, 0);
          ge.addColorStop(0, 'rgba(255,255,255,0)');
          ge.addColorStop(1, 'rgba(255,255,255,0.38)');
          ctx.fillStyle = ge; ctx.fillRect(W - xfdPx, 0, xfdPx, drawH);
          const gs = ctx.createLinearGradient(0, 0, xfdPx, 0);
          gs.addColorStop(0, 'rgba(255,255,255,0.38)');
          gs.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = gs; ctx.fillRect(0, 0, xfdPx, drawH);
        }
      }
    }

    function refreshTileWave(s) {
      const t = document.getElementById('t' + s.id);
      if (!t) return;
      const wc = t.querySelector('.tile-canvas');
      if (wc) drawTileWave(wc, s);
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function makeDraggable(tile, s) {
      let ox, oy, oL, oT, moved;
      tile.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        if (tile.classList.contains('expanded')) return;
        e.preventDefault(); e.stopPropagation();
        ox = e.clientX; oy = e.clientY;
        oL = parseInt(tile.style.left);
        oT = parseInt(tile.style.top);
        moved = false; tile._dragged = false;
        tile.classList.add('dragging');

        const mm = (ev) => {
          const dx = ev.clientX - ox, dy = ev.clientY - oy;
          if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
          if (!moved) return;
          const cw = cv.clientWidth, ch = cv.clientHeight;
          const nl = Math.max(-TW / 2, Math.min(cw - TW / 2, oL + dx));
          const nt = Math.max(-TH / 2, Math.min(ch - TH / 2, oT + dy));
          tile.style.left = nl + 'px';
          tile.style.top = nt + 'px';
          s.x = nl + TW / 2; s.y = nt + TH / 2;
          s.updateVol(); s.updatePan();
        };
        const mu = () => {
          tile.classList.remove('dragging');
          tile._dragged = moved;
          document.removeEventListener('mousemove', mm);
          document.removeEventListener('mouseup', mu);
          setTimeout(() => { tile._dragged = false; }, 60);
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });
    }

    // ════════════════════════════════════════════════════
    // PLAYHEAD ANIMATION LOOP
    // ════════════════════════════════════════════════════
    (function phLoop() {
      for (const [id, s] of samples) {
        const ph = document.getElementById('ph' + id);
        if (!ph) continue;
        if (!s.playing) { ph.style.display = 'none'; continue; }
        const pos = s.playheadPos();
        if (pos === null) { ph.style.display = 'none'; continue; }
        const tileX = pos * TW;
        ph.style.left = tileX + 'px';
        ph.style.display = 'block';
      }

      // Card playheads — one per open card
      for (const [cid, cardInfo] of openCards) {
        const si = samples.get(cid);
        const cph = cardInfo.phEl();
        if (!cph) continue;
        if (!(si instanceof Sample) || !si.playing) { cph.style.display = 'none'; continue; }
        const wrap = cardInfo.waveWrap();
        const W = wrap ? (wrap.clientWidth || 284) - 20 : 264;
        const pos = si.playheadPos();
        if (pos !== null) {
          // pos is 0..1 within the loop region in both normal and PS mode
          const absPos = si.loopStart + pos * (si.loopEnd - si.loopStart);
          const { start: vs, width: vw } = cardInfo.getZView();
          const viewPos = (absPos - vs) / vw;
          if (viewPos >= 0 && viewPos <= 1) {
            cph.style.left = viewPos * W + 'px';
            cph.style.display = 'block';
          } else {
            cph.style.display = 'none';
          }
        } else cph.style.display = 'none';
      }

      // Master VU meter
      if (masterMeter) {
        const mvc = document.getElementById('master-vu');
        if (mvc) drawVU(mvc, { meter: masterMeter });
      }

      // VU meters for open cards
      for (const [cid, cardInfo] of openCards) {
        const si = samples.get(cid);
        if (!(si instanceof Sample) || !si.meter) continue;
        const vuC = cardInfo.vuCanvas && cardInfo.vuCanvas();
        if (vuC) drawVU(vuC, si);
      }

      // VU meters for all tiles
      for (const [sid, si] of samples) {
        if (!(si instanceof Sample) || !si.meter) continue;
        const tile = document.getElementById('t' + sid);
        if (!tile) continue;
        const vuC = tile.querySelector('.tile-vu-canvas');
        if (vuC) drawVU(vuC, si);
      }

      // LFO modulation tick
      lfoModulationTick();
      updateLfoWires();

      requestAnimationFrame(phLoop);
    })();

    function drawVU(canvas, s) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width || 20, H = canvas.height || 80;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      let levels = s.meter.getValue();
      if (!Array.isArray(levels)) levels = [levels, levels];
      const barW = Math.floor((W - 3) / 2);
      const gap = W - barW * 2;
      for (let ch = 0; ch < 2; ch++) {
        const raw = levels[ch];
        const db = (raw === -Infinity || !isFinite(raw)) ? -60 : Math.max(-60, Math.min(6, raw));
        const normalized = (db + 60) / 66;
        const barH = Math.round(normalized * (H - 2));
        const x = ch === 0 ? 0 : barW + gap;
        ctx.fillStyle = '#111';
        ctx.fillRect(x, 1, barW, H - 2);
        if (barH > 0) {
          ctx.fillStyle = '#fff';
          ctx.fillRect(x, H - 1 - barH, barW, barH);
        }
      }
    }

    // ════════════════════════════════════════════════════
    // IMPORT
    // ════════════════════════════════════════════════════
    const AUDIO_EXTS = new Set(['wav', 'mp3', 'ogg', 'flac', 'aiff', 'aif', 'm4a', 'opus', 'webm', 'weba']);
    const isAudio = n => AUDIO_EXTS.has((n.split('.').pop() || '').toLowerCase());

    async function importFile(file, dropPos = null) {
      if (!isAudio(file.name)) return;

      const id = nextId++;
      const name = file.name.replace(/\.[^.]+$/, '');
      const cw = cv.clientWidth || 800;
      const ch = cv.clientHeight || 500;
      let x, y;
      if (dropPos) {
        const cvRect = cv.getBoundingClientRect();
        x = Math.max(TW / 2, Math.min(cw - TW / 2, dropPos.x - cvRect.left));
        y = Math.max(TH / 2, Math.min(ch - TH / 2, dropPos.y - cvRect.top));
      } else {
        x = 80 + Math.random() * (cw - 160);
        y = 60 + Math.random() * (ch - 120);
      }

      // Placeholder tile while decoding
      const stub = document.createElement('div');
      stub.className = 'tile';
      stub.id = 'stub' + id;
      stub.style.cssText = `left:${x - TW / 2}px;top:${y - TH / 2}px;
    display:flex;align-items:center;justify-content:center;opacity:0.3;`;
      stub.innerHTML = `<div style="font-size:9px;color:#555555;letter-spacing:.1em;font-weight:700;text-transform:uppercase">Decoding…</div>`;
      cv.appendChild(stub);
      samples.set(id, { id, name, x, y, playing: false, muted: false, gridSync: false });
      updateEmpty();

      try {
        const ab = await file.arrayBuffer();
        const decoded = await new Promise((res, rej) =>
          Tone.context.rawContext.decodeAudioData(ab.slice(0), res, rej)
        );

        if (stub.parentNode) stub.remove();

        const s = new Sample(id, name, decoded, x, y);
        samples.set(id, s);
        createTile(s);

        // Auto-play immediately on load
        startSample(s);
        openCard(id);

      } catch (err) {
        console.error('Import failed:', file.name, err.message || err);
        if (stub.parentNode) stub.remove();
        samples.delete(id);
        updateEmpty();
      }
    }

    async function importList(list, dropPos = null) {
      const audioFiles = Array.from(list).filter(f => isAudio(f.name));
      const pos = audioFiles.length === 1 ? dropPos : null;
      audioFiles.forEach(f => importFile(f, pos));
    }

    async function importFromDT(items, fallbackFiles, dropPos = null) {
      const files = [];
      const readEntry = e => new Promise(res => {
        if (!e) return res();
        if (e.isFile) {
          e.file(f => { files.push(f); res(); }, res);
        } else if (e.isDirectory) {
          const r = e.createReader();
          const readAll = () => r.readEntries(async en => {
            if (!en.length) return res();
            await Promise.all(en.map(readEntry));
            readAll();
          }, res);
          readAll();
        } else res();
      });
      const entries = Array.from(items)
        .map(i => i.webkitGetAsEntry && i.webkitGetAsEntry())
        .filter(Boolean);
      await Promise.all(entries.map(readEntry));
      // If File System API gave us nothing (e.g. local file:// quirk), fall back
      if (files.length === 0 && fallbackFiles && fallbackFiles.length) {
        importList(fallbackFiles, dropPos);
      } else {
        importList(files, dropPos);
      }
    }

    function startSample(s) {
      if (!(s instanceof Sample)) return;
      if (sampleSeqMap.has(s.id)) return; // controlled by step sequencer
      // Respect solo
      if (soloId !== null && soloId !== s.id) return;
      if (s.gridSync) s.playGrid();
      else s.play();
    }

    function togglePlay(id) {
      const s = samples.get(id);
      if (!(s instanceof Sample) || !audioReady) return;
      if (s.playing) s.stop();
      else startSample(s);
    }

    function refreshSoloVis() {
      for (const [id, s] of samples) {
        const t = document.getElementById('t' + id);
        if (!t) continue;
        t.classList.toggle('soloed', soloId !== null && id === soloId);
        t.classList.toggle('solo-dim', soloId !== null && id !== soloId);
        const sbtn = t.querySelector('.tile-sbtn');
        if (sbtn) sbtn.classList.toggle('solo-on', soloId === id);

        // Sync card if open
        if (openCards.has(id)) {
          const card = openCards.get(id).el;
          const btn = card.querySelector('.card-solo-btn');
          if (btn) btn.classList.toggle('solo-on', soloId === id);
        }
      }
    }

    function applyAllVols() {
      for (const [, s] of samples) {
        if (s instanceof Sample) s.vol.volume.value = s._effectiveDb();
      }
    }

    function removeSample(id) {
      const s = samples.get(id);
      // Disconnect from any seq before disposing
      if (sampleSeqMap.has(id)) {
        const seqId = sampleSeqMap.get(id);
        const seq = seqs.get(seqId);
        if (seq) {
          seq.removeDestination(id);
          seqNodes.get(seqId)?.updateDestList();
        }
        sampleSeqMap.delete(id);
      }
      if (s instanceof Sample) s.dispose();
      const t = document.getElementById('t' + id) || document.getElementById('stub' + id);
      if (t) t.remove();
      samples.delete(id);
      if (openCards.has(id)) closeCard(id);
      if (soloId === id) { soloId = null; applyAllVols(); refreshSoloVis(); }
      // Clean up LFO destinations referencing this sample
      for (const [, lfo] of lfos) {
        const before = lfo.destinations.length;
        lfo.destinations = lfo.destinations.filter(d => d.sampleId !== id);
        if (lfo.destinations.length !== before) {
          const nodeInfo = lfoNodes.get(lfo.id);
          if (nodeInfo) nodeInfo.updateDestList();
        }
      }
      updateLfoWires();
      updateEmpty();
    }

    function duplicateSample(src) {
      const id = nextId++;
      const offset = 24;
      const s = new Sample(id, src.name, src.raw, src.x + offset, src.y + offset);

      // Copy all settings
      s.color = src.color;
      s.loopStart = src.loopStart;
      s.loopEnd = src.loopEnd;
      s.filePosition = src.filePosition;
      s.reversed = src.reversed;
      if (src.reversed && src._revBuf) s._revBuf = src._revBuf; // share reversed buffer
      s.setPitch(src.pitchST);
      s.setStretch(src.stretchST);
      if (src.psStretch > 1) s.setPsStretch(src.psStretch);
      s.setClipGain(src.clipGainDb);
      s.gridSync = src.gridSync;
      s.subdiv = src.subdiv;
      s.subdivFactor = src.subdivFactor;
      s.gridMulti = src.gridMulti;
      s.attackTime = src.attackTime;
      s.releaseTime = src.releaseTime;
      s.crossfadeTime = src.crossfadeTime;
      s.muted = src.muted;

      // Copy EQ bands
      src.eqBands.forEach((b, i) => {
        s.eqBands[i] = { ...b };
        s.eqFilters[i].frequency.value = b.freq;
        s.eqFilters[i].Q.value = b.q;
        if (b.type === 'peaking') s.eqFilters[i].gain.value = b.gain || 0;
      });

      // Copy FX chain
      src.fxChain.forEach(inst => {
        const copy = s.addFxInstance(inst.type);
        if (!copy) return;
        if (inst.type === 'eq' && inst.eqData) {
          inst.eqData.bands.forEach((b, i) => {
            copy.eqData.bands[i] = { ...b };
            copy.eqData.applyBand(i);
          });
        } else if (inst.params) {
          Object.assign(copy.params, inst.params);
          applyFxNodeParams(copy);
        }
        if (inst.postFader) {
          copy.postFader = true;
          s.rebuildFxChain();
        }
      });

      s.updateVol();
      s.updatePan();
      samples.set(id, s);
      createTile(s);
      startSample(s);
      updateEmpty();
      openCard(id);

      // Reposition the new card so it's visibly offset from the source card
      const srcInfo = openCards.get(src.id);
      const newInfo = openCards.get(id);
      if (srcInfo && newInfo) {
        const ox = parseFloat(srcInfo.el.style.left) || 0;
        const oy = parseFloat(srcInfo.el.style.top) || 0;
        const step = 30;
        const nx = Math.max(8, Math.min(window.innerWidth - 288, ox + step));
        const ny = Math.max(48, Math.min(window.innerHeight - 480, oy + step));
        newInfo.el.style.left = nx + 'px';
        newInfo.el.style.top = ny + 'px';
      }
    }

    function updateEmpty() {
      document.getElementById('empty').classList.toggle('gone', samples.size > 0);
      document.getElementById('sc').textContent = samples.size;
      updateSampleList();
    }

    function updateSampleList() {
      const el = document.getElementById('sample-list');
      el.innerHTML = '';
      for (const [id, s] of samples) {
        const item = document.createElement('div');
        item.className = 'slist-item' + (openCards.has(id) ? ' open' : '');
        item.textContent = s.name.length > 20 ? s.name.slice(0, 20) : s.name;
        item.addEventListener('click', () => {
          if (openCards.has(id)) { closeCard(id); } else { openCard(id); }
          updateSampleList();
        });
        el.appendChild(item);
      }
    }

    function fmtFade(secs) {
      if (secs < 0.0005) return '0 ms';
      if (secs < 1) return Math.round(secs * 1000) + ' ms';
      return secs.toFixed(2) + ' s';
    }

    function openCard(id, tile) {
      const s = samples.get(id);
      if (!(s instanceof Sample)) return;

      // If already open, just bring to front
      if (openCards.has(id)) {
        const info = openCards.get(id);
        info.el.style.zIndex = ++cardZTop;
        return;
      }

      if (!tile) tile = document.getElementById('t' + id);
      createCardForSample(s, tile);
      // Reapply LFO overrides on the newly opened card
      requestAnimationFrame(() => applyCardOverrides(id));
      updateSampleList();
    }

    function closeCard(id) {
      const info = openCards.get(id);
      if (!info) return;
      info.el.remove();
      openCards.delete(id);
      const tile = document.getElementById('t' + id);
      if (tile) tile.classList.remove('active', 'expanded');
      updateSampleList();
    }

            </div>

      const q = sel => cardEl.querySelector(sel);

      // Set initial values
      cardEl.style.borderColor = s.color;

      q('.card-ph').style.background = s.color;

      // init sync pos for visual

      function setGridUI(on) {

      function updateFadeDisabled() {

      // ── Clip gain strip ──
      function updateGainHandle() {
        const handle = q('.card-gain-handle');
        const strip = q('.card-gain-strip');
        if (!handle || !strip) return;
        const H = strip.clientHeight || 80;
        // +12dB = top (norm 0), -12dB = bottom (norm 1)
        const norm = (12 - s.clipGainDb) / 24;
        handle.style.top = Math.round(norm * H) + 'px';
      }

      q('.card-gain-strip').addEventListener('mousedown', e => {
        e.stopPropagation();
        e.preventDefault();
        const strip = q('.card-gain-strip');
        const rect = strip.getBoundingClientRect();
        const startY = e.clientY;
        const startDb = s.clipGainDb;
        const H = rect.height;
        const mm = ev => {
          const dy = ev.clientY - startY;
          // full strip height = 24dB range; drag up = gain up
          const dbDelta = -(dy / H) * 24;
          s.setClipGain(startDb + dbDelta);
          updateGainHandle();
          drawWave();
          refreshTileWave(s);
        };
        const mu = () => {
          document.removeEventListener('mousemove', mm);
          document.removeEventListener('mouseup', mu);
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });

      function drawWave() {
        const wrap = q('.card-wave-wrap');
        const W = (wrap.clientWidth || 284) - 20, H = wrap.clientHeight || 80;
        const c = q('.card-wave-canvas');
        c.width = W; c.height = H;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
        const peaks = s.getHiResPeaks();
        const { start: vs, end: ve } = getZView();
        const startIdx = vs * peaks.length;
        const endIdx = ve * peaks.length;
        const range = endIdx - startIdx;
        const step = range / W;
        const clipScale = Math.pow(10, s.clipGainDb / 20);
        for (let i = 0; i < W; i++) {
          const binStart = Math.floor(startIdx + i * step);
          const binEnd = Math.ceil(startIdx + (i + 1) * step);
          let amp = 0;
          for (let b = binStart; b < binEnd && b < peaks.length; b++) {
            if (peaks[b] > amp) amp = peaks[b];
          }
          const scaledAmp = Math.min(1, amp * clipScale);
          const barH = Math.max(1, scaledAmp * H * 0.88);
          ctx.fillStyle = `rgba(255,255,255,${0.25 + scaledAmp * 0.75})`;
          ctx.fillRect(i, H / 2 - barH / 2, 1, barH);
        }
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(0, H / 2, W, 1);
        const vw = ve - vs;
        const toX = norm => (norm - vs) / vw * W;

        const _cardDur = s._activeDur;
        const _psActive = s.psStretch > 1 && s._psBuffer;

        if (s.attackTime > 0) {
          const atkEndNorm = Math.min(s.loopEnd, s.loopStart + s.attackTime / _cardDur);
          const x0 = Math.max(0, toX(s.loopStart));
          const x1 = Math.min(W, Math.max(x0, toX(atkEndNorm)));
          if (x1 > x0) {
            const g = ctx.createLinearGradient(x0, 0, x1, 0);
            g.addColorStop(0, 'rgba(0,0,0,0.78)'); g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g; ctx.fillRect(x0, 0, x1 - x0, H);
          }
        }
        if (s.releaseTime > 0) {
          const relStartNorm = Math.max(s.loopStart, s.loopEnd - s.releaseTime / _cardDur);
          const x0 = Math.max(0, Math.min(W, toX(relStartNorm)));
          const x1 = Math.min(W, toX(s.loopEnd));
          if (x1 > x0) {
            const g = ctx.createLinearGradient(x0, 0, x1, 0);
            g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.78)');
            ctx.fillStyle = g; ctx.fillRect(x0, 0, x1 - x0, H);
          }
        }
        if (s.crossfadeTime > 0) {
          const xfdNorm = s.crossfadeTime / _cardDur;
          // In PS mode the loop is the whole content — no pre/post region to borrow from
          const preAvail = _psActive ? false : s.loopStart * _cardDur >= s.crossfadeTime;
          const postAvail = _psActive ? false : (1 - s.loopEnd) * _cardDur >= s.crossfadeTime;
          const sxOut = toX(s.loopStart - xfdNorm), sxMid = toX(s.loopStart), sxIn = toX(s.loopStart + xfdNorm);
          if (preAvail && sxMid > sxOut) {
            const g = ctx.createLinearGradient(Math.max(0, sxOut), 0, sxMid, 0);
            g.addColorStop(0, 'rgba(255,255,255,0)'); g.addColorStop(1, 'rgba(255,255,255,0.5)');
            ctx.fillStyle = g; ctx.fillRect(Math.max(0, sxOut), 0, sxMid - Math.max(0, sxOut), H);
          }
          if (sxIn > sxMid) {
            const g = ctx.createLinearGradient(sxMid, 0, Math.min(W, sxIn), 0);
            g.addColorStop(0, preAvail ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.35)'); g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g; ctx.fillRect(sxMid, 0, Math.min(W, sxIn) - sxMid, H);
          }
          const exIn = toX(s.loopEnd - xfdNorm), exMid = toX(s.loopEnd), exOut = toX(s.loopEnd + xfdNorm);
          if (exMid > exIn) {
            const g = ctx.createLinearGradient(Math.max(0, exIn), 0, exMid, 0);
            g.addColorStop(0, 'rgba(255,255,255,0)'); g.addColorStop(1, postAvail ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.35)');
            ctx.fillStyle = g; ctx.fillRect(Math.max(0, exIn), 0, exMid - Math.max(0, exIn), H);
          }
          if (postAvail && exOut > exMid) {
            const g = ctx.createLinearGradient(exMid, 0, Math.min(W, exOut), 0);
            g.addColorStop(0, 'rgba(255,255,255,0.5)'); g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g; ctx.fillRect(exMid, 0, Math.min(W, exOut) - exMid, H);
          }
        }
      }

      function updateFpHandle() {
        const fpEl = q('.card-fp');
        if (!fpEl) return;
        const W = (q('.card-wave-wrap').clientWidth || 284) - 20;
        const { start: vs, width: vw } = getZView();
        const fpX = (s.filePosition - vs) / vw * W;
        // Show whenever it's within view (can be left of loop region now)
        const inView = fpX >= -7 && fpX <= W + 7;
        fpEl.style.display = inView ? '' : 'none';
        if (inView) fpEl.style.left = Math.round(fpX) + 'px';
      }

      function updateLoopReg() {
        const W = (q('.card-wave-wrap').clientWidth || 284) - 20;
        const { start: vs, width: vw } = getZView();
        const reg = q('.card-loop-reg');
        const regStart = (s.loopStart - vs) / vw;
        const regEnd = (s.loopEnd - vs) / vw;
        reg.style.left = regStart * W + 'px';
        reg.style.width = Math.max(0, (regEnd - regStart) * W) + 'px';
        q('.ct-s').textContent = 'Start: ' + (s.loopStart * s._activeDur).toFixed(3) + 's';
        q('.ct-e').textContent = 'End: ' + (s.loopEnd * s._activeDur).toFixed(3) + 's';
        drawWave();
        refreshTileWave(s);
        updateFpHandle();
        if (typeof updateFilePosSlider === 'function') updateFilePosSlider();
        if (typeof updateBoundSliders === 'function') updateBoundSliders();
      }

      function snapEndToSubdiv() {
        const bpm = Tone.Transport.bpm.value;
        const subdivSec = (60 / bpm) * (4 / s.subdiv) * s.subdivFactor;
        const snappedEnd = Math.min(1, s.loopStart + subdivSec / s.duration);
        s.setLoopBounds(s.loopStart, snappedEnd);
        updateLoopReg();
      }

      function bringToFront() { cardEl.style.zIndex = ++cardZTop; }

      // Position near tile
      const tileRect = tile ? tile.getBoundingClientRect() : { left: window.innerWidth / 2 - 140, top: 80 };
      const CW = 280, CH = 420;
      const margin = 8;
      let cx = tileRect.left + TW / 2 - CW / 2;
      let cy = tileRect.top;
      cx = Math.max(margin, Math.min(window.innerWidth - CW - margin, cx));
      cy = Math.max(margin + 40, Math.min(window.innerHeight - CH - 60, cy));
      cardEl.style.left = cx + 'px';
      cardEl.style.top = cy + 'px';
      cardEl.style.zIndex = ++cardZTop;

      if (tile) tile.classList.add('active', 'expanded');
      document.body.appendChild(cardEl);
      requestAnimationFrame(() => cardEl.classList.add('open'));
      requestAnimationFrame(() => { drawWave(); updateLoopReg(); updateGainHandle(); });

      // Store in openCards with references needed by phLoop
      openCards.set(s.id, { el: cardEl, getZView, phEl: () => q('.card-ph'), waveWrap: () => q('.card-wave-wrap'), vuCanvas: () => q('.card-vu-canvas'), _drawWave: () => { drawWave(); updateLoopReg(); } });

      // ── Titlebar drag ──
      q('.card-titlebar').addEventListener('mousedown', e => {
        if (e.button !== 0 || e.target.classList.contains('card-close') || e.target.classList.contains('card-dup') || e.target.classList.contains('card-remove')) return;
        e.preventDefault(); e.stopPropagation();
        bringToFront();
        _cardDragged = false;
        const sx = e.clientX, sy = e.clientY;
        const cx0 = parseFloat(cardEl.style.left) || 0;
        const cy0 = parseFloat(cardEl.style.top) || 0;
        const cvRect = cv.getBoundingClientRect();
        const tileEl = document.getElementById('t' + s.id);
        const mm = ev => {
          if (Math.abs(ev.clientX - sx) + Math.abs(ev.clientY - sy) > 3) _cardDragged = true;
          const nx = cx0 + (ev.clientX - sx);
          const ny = cy0 + (ev.clientY - sy);
          cardEl.style.left = nx + 'px';
          cardEl.style.top = ny + 'px';
          if (tileEl) {
            tileEl.style.left = (nx - cvRect.left + 72) + 'px';
            tileEl.style.top = (ny - cvRect.top) + 'px';
          }
          s.x = nx - cvRect.left + 140;
          s.y = ny - cvRect.top + 28;
          s.updateVol(); s.updatePan();
        };
        const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
        document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
      });

      q('.card-titlebar').addEventListener('click', e => {
        if (e.target.classList.contains('card-close') || e.target.classList.contains('card-dup') || e.target.classList.contains('card-remove')) return;
        if (!_cardDragged) closeCard(s.id);
      });

      q('.card-close').addEventListener('click', e => { e.stopPropagation(); closeCard(s.id); });
      q('.card-dup').addEventListener('click', e => { e.stopPropagation(); duplicateSample(s); });
      cardEl.addEventListener('mousedown', () => bringToFront());

      // ── Loop handles ──
      ['.clh-s', '.clh-e'].forEach(sel => {
        const isStart = sel === '.clh-s';
        q(sel).addEventListener('mousedown', e => {
          e.stopPropagation();
          if (!isStart && s.gridSync) return;
          const wrap = q('.card-wave-wrap');
          const rect = wrap.getBoundingClientRect(), W = rect.width - 20;
          const mm = ev => {
            const relView = Math.max(0, Math.min(1, (ev.clientX - rect.left) / W));
            const { start: vs, width: vw } = getZView();
            const rel = Math.max(0, Math.min(1, vs + relView * vw));
            if (isStart) {
              s.setLoopBounds(Math.min(rel, s.loopEnd - 1e-4), s.loopEnd);
            } else {
              s.setLoopBounds(s.loopStart, Math.max(rel, s.loopStart + 1e-4));
            }
            updateLoopReg();
          };
          const mu = () => {
            document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu);
            if (isStart && s.gridSync) { snapEndToSubdiv(); return; } // next grid tick picks up new bounds
            if (s.playing && !s.gridSync) {
              const hasFades = s.attackTime > 0 || s.releaseTime > 0 || s.crossfadeTime > 0;
              if (hasFades) {
                // Flag restart at next loop wrap boundary (detected in playheadPos)
                clearTimeout(s._filePosTimer);
                s._pendingRestart = true;
                const pos = s.playheadPos();
                const fwd = pos !== null ? (s.reversed ? 1 - pos : pos) : 1;
                const remaining = Math.max(0, (1 - fwd) * s.lenSec / s._pbRate);
                s._filePosTimer = setTimeout(() => {
                  if (s.playing && !s.gridSync && s._pendingRestart) {
                    s._pendingRestart = false;
                    s.play();
                  }
                }, remaining * 1000 + 300);
              }
              // No fades: native loopStart/loopEnd updated live in setLoopBounds — no jump needed
            }
          };
          document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
        });
      });

      // ── Waveform zoom/pan ──
      // Cursor hint: crosshair over waveform bars, zoom-in over empty space
      q('.card-wave-wrap').addEventListener('mousemove', e => {
        if (e.buttons !== 0) return;
        const wrap = q('.card-wave-wrap');
        const rect = wrap.getBoundingClientRect();
        const W = rect.width - 20, H = rect.height;
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        if (mx < 0 || mx >= W) return;
        const { start: vs, width: vw } = getZView();
        const norm = vs + (mx / W) * vw;
        const peaks = s.getHiResPeaks();
        const clipScale = Math.pow(10, s.clipGainDb / 20);
        const idx = Math.max(0, Math.min(peaks.length - 1, Math.round(norm * peaks.length)));
        const scaledAmp = Math.min(1, (peaks[idx] || 0) * clipScale);
        const barH = Math.max(1, scaledAmp * H * 0.88);
        const onBar = my >= H / 2 - barH / 2 && my <= H / 2 + barH / 2 && scaledAmp > 0.02;
        wrap.style.cursor = onBar ? 'crosshair' : 'zoom-in';
      });

      q('.card-wave-wrap').addEventListener('mousedown', e => {
        if (e.button !== 0 || e.target.closest('.lh') || e.target.closest('.card-fp')) return;
        e.preventDefault(); e.stopPropagation();
        const wrap = q('.card-wave-wrap');
        const rect = wrap.getBoundingClientRect();
        const W = rect.width - 20, H = rect.height;
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const mouseViewX = Math.max(0, Math.min(1, mx / W));
        const { start: vs, end: ve, width: vw } = getZView();

        // Detect whether click lands on a waveform bar
        const norm = vs + mouseViewX * vw;
        const peaks = s.getHiResPeaks();
        const clipScale = Math.pow(10, s.clipGainDb / 20);
        const idx = Math.max(0, Math.min(peaks.length - 1, Math.round(norm * peaks.length)));
        const scaledAmp = Math.min(1, (peaks[idx] || 0) * clipScale);
        const barH = Math.max(1, scaledAmp * H * 0.88);
        const onWaveform = my >= H / 2 - barH / 2 && my <= H / 2 + barH / 2 && scaledAmp > 0.02;

        if (onWaveform) {
          // ── SELECTION MODE: drag to set loop region ──
          wrap.style.cursor = 'crosshair';
          let selStart = norm, selEnd = norm;

          const drawSel = () => {
            drawWave();
            updateLoopReg();
            const c = q('.card-wave-canvas');
            const ctx = c.getContext('2d');
            const { start: cvs, width: cvw } = getZView();
            const x1 = (selStart - cvs) / cvw * W;
            const x2 = (selEnd - cvs) / cvw * W;
            const xL = Math.min(x1, x2), xR = Math.max(x1, x2);
            if (xR > xL) {
              ctx.fillStyle = 'rgba(255,255,255,0.12)';
              ctx.fillRect(xL, 0, xR - xL, H);
              ctx.strokeStyle = 'rgba(255,255,255,0.55)';
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(Math.round(xL) + 0.5, 0);
              ctx.lineTo(Math.round(xL) + 0.5, H);
              ctx.moveTo(Math.round(xR) + 0.5, 0);
              ctx.lineTo(Math.round(xR) + 0.5, H);
              ctx.stroke();
            }
          };

          const mm = ev => {
            const cur = vs + Math.max(0, Math.min(1, (ev.clientX - rect.left) / W)) * vw;
            selStart = Math.min(norm, cur);
            selEnd = Math.max(norm, cur);
            drawSel();
          };
          const mu = () => {
            wrap.style.cursor = '';
            document.removeEventListener('mousemove', mm);
            document.removeEventListener('mouseup', mu);
            if (selEnd - selStart > 0.002) {
              s.setLoopBounds(selStart, selEnd);
              s.filePosition = selStart;
              updateFpHandle();
            }
            updateLoopReg();
            drawWave();
          };
          document.addEventListener('mousemove', mm);
          document.addEventListener('mouseup', mu);

        } else {
          // ── ZOOM MODE: existing drag-to-zoom/pan ──
          const mouseAbsPos = vs + mouseViewX * vw;
          const startX = e.clientX, startY = e.clientY, startZoom = waveZoom;
          const mm = ev => {
            const dx = ev.clientX - startX, dy = ev.clientY - startY;
            wrap.style.cursor = 'all-scroll';
            const newZoom = Math.max(1, Math.min(WAVE_ZOOM_MAX, startZoom * Math.pow(1.025, dy)));
            waveZoom = newZoom;
            const newVW = 1 / newZoom;
            let newVS = mouseAbsPos - mouseViewX * newVW + (dx / W) * newVW;
            newVS = Math.max(0, Math.min(1 - newVW, newVS));
            waveZoomCenter = newVS + newVW / 2;
            drawWave(); updateLoopReg(); updateZoomLbl();
          };
          const mu = () => {
            wrap.style.cursor = '';
            document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu);
            const blockClick = ev => { ev.stopPropagation(); document.removeEventListener('click', blockClick, true); };
            document.addEventListener('click', blockClick, true);
          };
          document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
        }
      });

      q('.card-wave-wrap').addEventListener('dblclick', e => {
        if (e.target.closest('.lh') || e.target.closest('.card-fp')) return;
        waveZoom = 1.0; waveZoomCenter = 0.5;
        drawWave(); updateLoopReg(); updateZoomLbl();
      });

      // ── Controls ──
      q('.card-play').addEventListener('click', e => {
        e.stopPropagation();
        togglePlay(s.id);
        q('.card-play').classList.toggle('act', s.playing);
      });
      q('.card-stop').addEventListener('click', e => {
        e.stopPropagation();
        s.stop(); q('.card-play').classList.remove('act');
      });
      q('.card-mute-btn').addEventListener('click', e => {
        e.stopPropagation();
        s.muted = !s.muted;
        q('.card-mute-btn').classList.toggle('mute-on', s.muted);
        s.vol.volume.value = s._effectiveDb(); s._renderTile();
      });
      q('.card-solo-btn').addEventListener('click', e => {
        e.stopPropagation();
        soloId = (soloId === s.id) ? null : s.id;
        q('.card-solo-btn').classList.toggle('solo-on', soloId === s.id);
        applyAllVols(); refreshSoloVis();
      });
      q('.card-rev').addEventListener('click', e => {
        e.stopPropagation();
        s.setReverse(!s.reversed);
        e.target.classList.toggle('act', s.reversed);
      });
      q('.card-pitch').addEventListener('input', e => {
        s.setPitch(parseInt(e.target.value));
      });
      q('.card-vol').addEventListener('input', e => {
        s.setVolPos(parseFloat(e.target.value));
      });
      q('.card-pan').addEventListener('input', e => {
        s.setPanPos(parseFloat(e.target.value));
      });
      q('.card-stretch').addEventListener('input', e => {
        s.setStretch(parseInt(e.target.value));
      });
      q('.card-ps').addEventListener('input', e => {
        const sliderVal = parseFloat(e.target.value);
        const ratio = sliderVal < 0.25 ? 1 : Math.pow(200, sliderVal / 100);
        s.setPsStretch(ratio);
        // Update the progress label if currently rendering
        const psLbl = e.target.closest('.crow').querySelector('.card-ps-status');
        if (psLbl && s._psRendering) psLbl.textContent = 'rendering…';
        else if (psLbl) psLbl.textContent = '';
      });
      q('.card-grid').addEventListener('click', e => {
        e.stopPropagation();
        s.gridSync = !s.gridSync;
        q('.card-grid').classList.toggle('act', s.gridSync);
        if (s.gridSync) snapEndToSubdiv();
        setGridUI(s.gridSync); s._renderTile();
        if (s.playing) { s._cancelGrid(); s._stopPlayer(); s.player.loop = false; if (s.gridSync) s.playGrid(); else s.play(); }
      });
      q('.card-subdiv').addEventListener('change', e => {
        e.stopPropagation();
        s.subdiv = parseFloat(e.target.value);
        if (s.gridSync) snapEndToSubdiv();
        if (s.playing && s.gridSync) { s._cancelGrid(); s._stopPlayer(); s.playGrid(); }
      });
      function setSubdivMod(factor) {
        s.subdivFactor = (s.subdivFactor === factor) ? 1 : factor;
        q('.card-dot-btn').classList.toggle('act', s.subdivFactor === 1.5);
        q('.card-tri-btn').classList.toggle('act', s.subdivFactor < 1);
        if (s.gridSync) snapEndToSubdiv();
        if (s.playing && s.gridSync) { s._cancelGrid(); s._stopPlayer(); s.playGrid(); }
      }
      q('.card-dot-btn').addEventListener('click', e => { e.stopPropagation(); setSubdivMod(1.5); });
      q('.card-tri-btn').addEventListener('click', e => { e.stopPropagation(); setSubdivMod(2 / 3); });
      function setGridMulti(n) {
        s.gridMulti = (s.gridMulti === n) ? 1 : n;
        q('.card-skip2-btn').classList.toggle('act', s.gridMulti === 2);
        q('.card-skip3-btn').classList.toggle('act', s.gridMulti === 3);
        if (s.playing && s.gridSync) { s._cancelGrid(); s._stopPlayer(); s.playGrid(); }
      }
      q('.card-skip2-btn').addEventListener('click', e => { e.stopPropagation(); setGridMulti(2); });
      q('.card-skip3-btn').addEventListener('click', e => { e.stopPropagation(); setGridMulti(3); });
      q('.card-remove').addEventListener('click', e => { e.stopPropagation(); removeSample(s.id); });

      ['attack', 'release', 'xfade'].forEach(key => {
        q('.card-' + key).addEventListener('input', e => {
          e.stopPropagation();
          const v = parseFloat(e.target.value);
          const prop = key === 'xfade' ? 'crossfadeTime' : key + 'Time';
          if (key === 'xfade' && v > 0) {
            s.attackTime = 0; s.releaseTime = 0;
            setFadeSl('card-attack', 0); setFadeSl('card-release', 0);
          } else if (key !== 'xfade' && v > 0) {
            s.crossfadeTime = 0;
            setFadeSl('card-xfade', 0);
          }
          s[prop] = v; s._fadedBuf = null; s._psFadedBuf = null;
          const lbl = e.target.closest('.cslider')?.querySelector('.cslider-lbl');
          if (lbl) lbl.textContent = fmtFade(v);
          updateFadeDisabled(); drawWave(); updateLoopReg();
          if (s.playing && !s.gridSync) {
            // Apply on next loop boundary — no position jump
            s._pendingRestart = true;
            clearTimeout(s._filePosTimer);
            const _pos = s.playheadPos();
            const _fwd = _pos !== null ? (s.reversed ? 1 - _pos : _pos) : 1;
            const _rem = Math.max(0, (1 - _fwd) * s.lenSec / s._pbRate);
            s._filePosTimer = setTimeout(() => {
              if (s.playing && !s.gridSync && s._pendingRestart) {
                s._pendingRestart = false;
                s.play();
              }
            }, _rem * 1000 + 300);
          }
        });
      });

      // ── Custom envelope sliders ──
      function setFadeSl(cls, val) {
        const sl = q('.' + cls);
        if (!sl) return;
        sl.value = val;
        const wrap = sl.closest('.cslider');
        if (wrap) {
          if (wrap._syncPos) wrap._syncPos();
          const lbl = wrap.querySelector('.cslider-lbl');
          if (lbl) lbl.textContent = fmtFade(val);
        }
      }

      const fmtST = v => (v >= 0 ? '+' : '') + Math.round(v) + ' st';
      const fmtPS = v => {
        const ratio = Math.pow(200, v / 100);
        if (v < 0.25) return 'Off';
        return (ratio < 10 ? ratio.toFixed(1) : Math.round(ratio)) + '×';
      };
      initCslider(q('.card-pitch').closest('.cslider'), fmtST);
      initCslider(q('.card-stretch').closest('.cslider'), fmtST);
      initCslider(q('.card-ps').closest('.cslider'), fmtPS);
      initCslider(q('.card-attack').closest('.cslider'));
      initCslider(q('.card-release').closest('.cslider'));
      initCslider(q('.card-xfade').closest('.cslider'));

      const fmtVol = v => Math.round(v * 100) + '%';
      const fmtPan = v => v < -0.01 ? 'L' + Math.round(-v * 100) : v > 0.01 ? 'R' + Math.round(v * 100) : 'C';
      initCslider(q('.card-vol').closest('.cslider'), fmtVol);
      initCslider(q('.card-pan').closest('.cslider'), fmtPan);

      // ── Loop Start / End sliders ──
      const fmtPos = v => (+v).toFixed(3) + 's';
      const lsSlider = q('.card-loopstart');
      const leSlider = q('.card-loopend');
      lsSlider.min = leSlider.min = 0;
      lsSlider.max = leSlider.max = s._activeDur;
      lsSlider.step = leSlider.step = Math.max(0.001, s._activeDur / 10000);
      lsSlider.value = s.loopStart * s._activeDur;
      leSlider.value = s.loopEnd * s._activeDur;
      initCslider(lsSlider.closest('.cslider'), fmtPos);
      initCslider(leSlider.closest('.cslider'), fmtPos);

      function updateBoundSliders() {
        const dur = s._activeDur;
        lsSlider.max = leSlider.max = dur;
        lsSlider.step = leSlider.step = Math.max(0.001, dur / 10000);
        lsSlider.value = s.loopStart * dur;
        leSlider.value = s.loopEnd * dur;
        lsSlider.closest('.cslider')?._syncPos?.();
        leSlider.closest('.cslider')?._syncPos?.();
      }
      updateBoundSliders();

      lsSlider.addEventListener('input', e => {
        e.stopPropagation();
        const dur = s._activeDur;
        const sec = Math.min(parseFloat(e.target.value), s.loopEnd * dur - 1e-4);
        s.setLoopBounds(sec / dur, s.loopEnd);
        updateLoopReg();
      });

      leSlider.addEventListener('input', e => {
        e.stopPropagation();
        const dur = s._activeDur;
        const sec = Math.max(parseFloat(e.target.value), s.loopStart * dur + 1e-4);
        s.setLoopBounds(s.loopStart, sec / dur);
        updateLoopReg();
      });

      // ── File Position slider ──
      const fpSlider = q('.card-filepos');
      fpSlider.min = 0;
      fpSlider.max = s._activeDur;
      fpSlider.step = Math.max(0.001, s._activeDur / 10000);
      fpSlider.value = s.filePosition * s._activeDur;
      initCslider(fpSlider.closest('.cslider'), fmtPos);

      function updateFilePosSlider() {
        fpSlider.min = 0;
        fpSlider.max = s._activeDur;
        fpSlider.step = Math.max(0.001, s._activeDur / 10000);
        fpSlider.value = s.filePosition * s._activeDur;
        const wrap = fpSlider.closest('.cslider');
        if (wrap?._syncPos) wrap._syncPos();
        updateFpHandle();
      }
      updateFilePosSlider();

      fpSlider.addEventListener('input', e => {
        e.stopPropagation();
        const sec = parseFloat(e.target.value);
        s.setFilePosition(sec / s._activeDur);
        updateFpHandle();
        const lbl = e.target.closest('.cslider')?.querySelector('.cslider-lbl');
        if (lbl) lbl.textContent = fmtPos(sec);
      });

      // ── File position handle drag (triangle on waveform) ──
      q('.card-fp').addEventListener('mousedown', e => {
        e.stopPropagation();
        e.preventDefault();
        const wrap = q('.card-wave-wrap');
        const rect = wrap.getBoundingClientRect();
        const W = rect.width - 20;
        const mm = ev => {
          const relView = Math.max(0, Math.min(1, (ev.clientX - rect.left) / W));
          const { start: vs, width: vw } = getZView();
          const norm = Math.max(0, Math.min(s.loopEnd, vs + relView * vw));
          // Set directly (no restart scheduling during drag)
          s.filePosition = norm;
          updateFpHandle();
          // Sync the slider
          fpSlider.value = norm * s._activeDur;
          if (fpSlider.closest('.cslider')?._syncPos) fpSlider.closest('.cslider')._syncPos();
          const lbl = fpSlider.closest('.cslider')?.querySelector('.cslider-lbl');
          if (lbl) lbl.textContent = fmtPos(norm * s._activeDur);
        };
        const mu = () => {
          document.removeEventListener('mousemove', mm);
          document.removeEventListener('mouseup', mu);
          // On release, apply with restart-scheduling behaviour
          s.setFilePosition(s.filePosition);
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
      });

      // ── Editable range fields (min/max) for each slider ──
      function wireRangeFields(sliderSel) {
        const slider = q(sliderSel);
        if (!slider) return;
        const fields = Array.from(slider.closest('.crow').querySelectorAll('.rng-field'));
        if (fields.length < 2) return;
        const [minF, maxF] = fields;
        [minF, maxF].forEach((f, i) => {
          f.addEventListener('mousedown', e => e.stopPropagation());
          f.addEventListener('click', e => e.stopPropagation());
          f.addEventListener('keydown', e => { if (e.key === 'Enter') f.blur(); e.stopPropagation(); });
          f.addEventListener('change', () => {
            const v = parseFloat(f.value);
            if (isNaN(v)) { f.value = i === 0 ? slider.min : slider.max; return; }
            if (i === 0) {
              slider.min = v;
              if (parseFloat(slider.value) < v) { slider.value = v; slider.dispatchEvent(new Event('input')); }
            } else {
              slider.max = v;
              if (parseFloat(slider.value) > v) { slider.value = v; slider.dispatchEvent(new Event('input')); }
            }
          });
        });
      }
      wireRangeFields('.card-pitch');
      wireRangeFields('.card-stretch');
      wireRangeFields('.card-attack');
      wireRangeFields('.card-release');
      wireRangeFields('.card-xfade');

      // ── FX Section ──
      buildFxSection(cardEl, s);

      return cardEl;
    }

    function buildFxSection(cardEl, s) {
      const fxSection = cardEl.querySelector('.fx-section');
      if (!fxSection) return;

      // Emit a full cslider row matching the existing card slider style
      function sliderRow(label, cls, min, max, val, step) {
        return `<div class="crow">
          <span class="clbl">${label}</span>
          <input type="text" class="rng-field" value="${min}">
          <div class="cslider">
            <input type="range" class="${cls}" min="${min}" max="${max}" step="${step}" value="${val}">
            <div class="cslider-thumb"><span class="cslider-lbl"></span><input class="cslider-edit" type="text"></div>
          </div>
          <input type="text" class="rng-field" value="${max}">
        </div>`;
      }

      // Init all csliders in body and wire range-field inputs
      function initFxSliders(body, fmtMap) {
        body.querySelectorAll('.cslider').forEach(wrap => {
          const native = wrap.querySelector('input[type=range]');
          const cls = Array.from(native.classList).find(c => fmtMap[c]);
          initCslider(wrap, cls ? fmtMap[cls] : (v => parseFloat(v).toFixed(2)));
          const fields = Array.from(wrap.closest('.crow').querySelectorAll('.rng-field'));
          if (fields.length < 2) return;
          const [minF, maxF] = fields;
          [minF, maxF].forEach((f, i) => {
            f.addEventListener('mousedown', e => e.stopPropagation());
            f.addEventListener('click', e => e.stopPropagation());
            f.addEventListener('keydown', e => { if (e.key === 'Enter') f.blur(); e.stopPropagation(); });
            f.addEventListener('change', () => {
              const v = parseFloat(f.value);
              if (isNaN(v)) { f.value = i === 0 ? native.min : native.max; return; }
              if (i === 0) {
                native.min = v;
                if (parseFloat(native.value) < v) { native.value = v; native.dispatchEvent(new Event('input')); }
              } else {
                native.max = v;
                if (parseFloat(native.value) > v) { native.value = v; native.dispatchEvent(new Event('input')); }
              }
              wrap._syncPos?.();
            });
          });
        });
      }

      const fmt2 = v => parseFloat(v).toFixed(2);
      const fmtHz = v => Math.round(parseFloat(v)) + 'Hz';
      const fmtHz1 = v => parseFloat(v).toFixed(1) + 'Hz';
      const fmtSec = v => parseFloat(v).toFixed(2) + 's';
      const fmtMs = v => Math.round(parseFloat(v) * 1000) + 'ms';
      const fmtInt = v => String(Math.round(parseFloat(v)));

      const FX_PANELS = {
        reverb: {
          build(body, p, node) {
            body.innerHTML =
              sliderRow('Decay', 'fx-r-decay', 0.1, 30, p.decay, 0.1) +
              sliderRow('Pre-Dly', 'fx-r-predly', 0, 0.5, p.preDelay, 0.001) +
              sliderRow('Wet', 'fx-r-wet', 0, 1, p.wet, 0.01);
            body.querySelector('.fx-r-decay').addEventListener('input', e => {
              p.decay = parseFloat(e.target.value); node.decay = p.decay;
            });
            body.querySelector('.fx-r-predly').addEventListener('input', e => {
              p.preDelay = parseFloat(e.target.value); node.preDelay = p.preDelay;
            });
            body.querySelector('.fx-r-wet').addEventListener('input', e => {
              p.wet = parseFloat(e.target.value); node.wet.value = p.wet;
            });
            initFxSliders(body, { 'fx-r-decay': fmtSec, 'fx-r-predly': fmtMs, 'fx-r-wet': fmt2 });
          }
        },
        delay: {
          build(body, p, node) {
            if (!p.syncMode) p.syncMode = false;
            if (!p.subdivision) p.subdivision = '4n';
            const subdivBeats = {
              '2n': 2, '2n.': 3, '2t': 4 / 3,
              '4n': 1, '4n.': 1.5, '4t': 2 / 3,
              '8n': 0.5, '8n.': 0.75, '8t': 1 / 3,
              '16n': 0.25, '16n.': 0.375, '16t': 1 / 6,
            };
            // Sorted longest → shortest by beat duration
            const subdivList = [
              ['2n.', '1/2·'], ['2n', '1/2'], ['4n.', '1/4·'], ['2t', '1/2T'],
              ['4n', '1/4'], ['8n.', '1/8·'], ['4t', '1/4T'], ['8n', '1/8'],
              ['16n.', '1/16·'], ['8t', '1/8T'], ['16n', '1/16'], ['16t', '1/16T'],
            ];
            body.innerHTML =
              sliderRow('Time', 'fx-d-time', 0, 2, p.delayTime, 0.01) +
              `<div class="fx-d-subdiv-row" style="display:none;flex-wrap:wrap;gap:2px;margin:0 -10px 8px;padding:4px 8px;border-top:1px solid #161616;border-bottom:1px solid #161616">
                ${subdivList.map(([k, lbl]) => `<button class="cbtn fx-subdiv-btn" data-sub="${k}" style="background:none;font-size:8px;padding:3px 2px;min-width:0">${lbl}</button>`).join('')}
              </div>` +
              sliderRow('Feedback', 'fx-d-fb', 0, 0.99, p.feedback, 0.01) +
              sliderRow('Wet', 'fx-d-wet', 0, 1, p.wet, 0.01) +
              `<div class="crow" style="margin-top:2px">
                <span class="clbl" style="font-size:8px">Sync</span>
                <button class="cbtn fx-sync-toggle" style="font-size:8px;padding:2px 8px">FREE</button>
              </div>`;

            const timeRow = body.querySelector('.fx-d-time').closest('.crow');
            const subdivRow = body.querySelector('.fx-d-subdiv-row');
            const syncBtn = body.querySelector('.fx-sync-toggle');

            function applySubdiv(sub) {
              p.subdivision = sub;
              const sec = (60 / Tone.Transport.bpm.value) * (subdivBeats[sub] ?? 1);
              node.delayTime.value = Math.min(sec, 2);
              p.delayTime = node.delayTime.value;
              body.querySelectorAll('.fx-subdiv-btn').forEach(b => {
                const active = b.dataset.sub === sub;
                b.style.color = active ? '#e0e0e0' : '';
                b.style.borderColor = active ? '#686868' : '';
              });
            }

            function setSyncMode(on) {
              p.syncMode = on;
              syncBtn.textContent = on ? 'TEMPO' : 'FREE';
              timeRow.style.display = on ? 'none' : '';
              subdivRow.style.display = on ? 'flex' : 'none';
              if (on) applySubdiv(p.subdivision);
            }

            syncBtn.addEventListener('click', e => { e.stopPropagation(); setSyncMode(!p.syncMode); });
            body.querySelectorAll('.fx-subdiv-btn').forEach(btn => {
              btn.addEventListener('click', e => { e.stopPropagation(); applySubdiv(btn.dataset.sub); });
            });
            body.querySelector('.fx-d-time').addEventListener('input', e => {
              p.delayTime = parseFloat(e.target.value); node.delayTime.value = p.delayTime;
            });
            body.querySelector('.fx-d-fb').addEventListener('input', e => {
              p.feedback = parseFloat(e.target.value); node.feedback.value = p.feedback;
            });
            body.querySelector('.fx-d-wet').addEventListener('input', e => {
              p.wet = parseFloat(e.target.value); node.wet.value = p.wet;
            });
            initFxSliders(body, { 'fx-d-time': fmtSec, 'fx-d-fb': fmt2, 'fx-d-wet': fmt2 });
            setSyncMode(p.syncMode);
          }
        },
        tremolo: {
          build(body, p, node) {
            body.innerHTML =
              sliderRow('Rate', 'fx-tr-rate', 0.1, 20, p.frequency, 0.1) +
              sliderRow('Depth', 'fx-tr-depth', 0, 1, p.depth, 0.01) +
              sliderRow('Wet', 'fx-tr-wet', 0, 1, p.wet, 0.01);
            body.querySelector('.fx-tr-rate').addEventListener('input', e => {
              p.frequency = parseFloat(e.target.value); node.frequency.value = p.frequency;
            });
            body.querySelector('.fx-tr-depth').addEventListener('input', e => {
              p.depth = parseFloat(e.target.value); node.depth.value = p.depth;
            });
            body.querySelector('.fx-tr-wet').addEventListener('input', e => {
              p.wet = parseFloat(e.target.value); node.wet.value = p.wet;
            });
            initFxSliders(body, { 'fx-tr-rate': fmtHz1, 'fx-tr-depth': fmt2, 'fx-tr-wet': fmt2 });
          }
        },
        dist: {
          build(body, p, node) {
            body.innerHTML =
              sliderRow('Drive', 'fx-di-drive', 0, 1, p.distortion, 0.01) +
              sliderRow('Wet', 'fx-di-wet', 0, 1, p.wet, 0.01);
            body.querySelector('.fx-di-drive').addEventListener('input', e => {
              p.distortion = parseFloat(e.target.value); node.distortion = p.distortion;
            });
            body.querySelector('.fx-di-wet').addEventListener('input', e => {
              p.wet = parseFloat(e.target.value); node.wet.value = p.wet;
            });
            initFxSliders(body, { 'fx-di-drive': fmt2, 'fx-di-wet': fmt2 });
          }
        },
        chorus: {
          build(body, p, node) {
            body.innerHTML =
              sliderRow('Rate', 'fx-ch-rate', 0.1, 10, p.frequency, 0.1) +
              sliderRow('Delay', 'fx-ch-dly', 2, 20, p.delayTime, 0.1) +
              sliderRow('Depth', 'fx-ch-depth', 0, 1, p.depth, 0.01) +
              sliderRow('Wet', 'fx-ch-wet', 0, 1, p.wet, 0.01);
            body.querySelector('.fx-ch-rate').addEventListener('input', e => {
              p.frequency = parseFloat(e.target.value); node.frequency.value = p.frequency;
            });
            body.querySelector('.fx-ch-dly').addEventListener('input', e => {
              p.delayTime = parseFloat(e.target.value); node.delayTime = p.delayTime;
            });
            body.querySelector('.fx-ch-depth').addEventListener('input', e => {
              p.depth = parseFloat(e.target.value); node.depth.value = p.depth;
            });
            body.querySelector('.fx-ch-wet').addEventListener('input', e => {
              p.wet = parseFloat(e.target.value); node.wet.value = p.wet;
            });
            initFxSliders(body, { 'fx-ch-rate': fmtHz1, 'fx-ch-dly': v => parseFloat(v).toFixed(1) + 'ms', 'fx-ch-depth': fmt2, 'fx-ch-wet': fmt2 });
          }
        },
        phaser: {
          build(body, p, node) {
            body.innerHTML =
              sliderRow('Rate', 'fx-ph-rate', 0.1, 20, p.frequency, 0.1) +
              sliderRow('Octaves', 'fx-ph-oct', 0, 8, p.octaves, 0.1) +
              sliderRow('Base Hz', 'fx-ph-base', 100, 4000, p.baseFrequency, 1) +
              sliderRow('Wet', 'fx-ph-wet', 0, 1, p.wet, 0.01);
            body.querySelector('.fx-ph-rate').addEventListener('input', e => {
              p.frequency = parseFloat(e.target.value); node.frequency.value = p.frequency;
            });
            body.querySelector('.fx-ph-oct').addEventListener('input', e => {
              p.octaves = parseFloat(e.target.value); node.octaves = p.octaves;
            });
            body.querySelector('.fx-ph-base').addEventListener('input', e => {
              p.baseFrequency = parseFloat(e.target.value); node.baseFrequency = p.baseFrequency;
            });
            body.querySelector('.fx-ph-wet').addEventListener('input', e => {
              p.wet = parseFloat(e.target.value); node.wet.value = p.wet;
            });
            initFxSliders(body, { 'fx-ph-rate': fmtHz1, 'fx-ph-oct': fmt2, 'fx-ph-base': fmtHz, 'fx-ph-wet': fmt2 });
          }
        },
        bitcrush: {
          build(body, p, node) {
            body.innerHTML =
              sliderRow('Bits', 'fx-bc-bits', 1, 16, p.bits, 1) +
              sliderRow('Wet', 'fx-bc-wet', 0, 1, p.wet, 0.01);
            body.querySelector('.fx-bc-bits').addEventListener('input', e => {
              p.bits = Math.round(parseFloat(e.target.value)); node.bits = p.bits;
            });

              p.wet = parseFloat(e.target.value); node.wet.value = p.wet;
            });
            initFxSliders(body, { 'fx-bc-bits': fmtInt, 'fx-bc-wet': fmt2 });
          }
        },
      };

      const shortNames = { eq: 'EQ', reverb: 'REV', delay: 'DLY', tremolo: 'TRM', dist: 'DST', chorus: 'CHR', phaser: 'PHS', bitcrush: 'BIT' };

      const btnRow = document.createElement('div');
      btnRow.className = 'fx-btn-row';

      const panelsEl = document.createElement('div');

      for (const def of s.fxCatalog) {
        const btn = document.createElement('button');
        btn.className = 'fx-btn';
        btn.style.setProperty('--fx-color', s.color);
        btn.textContent = shortNames[def.id] || def.id.toUpperCase().slice(0, 3);
        btnRow.appendChild(btn);

        btn.addEventListener('click', e => {
          e.stopPropagation();
          const inst = s.addFxInstance(def.id);
          if (!inst) return;
          const panelEl = document.createElement('div');
          panelEl.className = 'fx-panel';
          panelEl.dataset.fxUid = inst.uid;
          panelEl.style.setProperty('--fx-color', s.color);
          const hdr = document.createElement('div');
          hdr.className = 'fx-panel-hdr';
          hdr.innerHTML = `<span class="fx-panel-lbl">${def.name}</span>`;
          const hdrRight = document.createElement('div');
          hdrRight.style.cssText = 'display:flex;align-items:center;gap:2px';
          const faderBtn = document.createElement('button');
          faderBtn.className = 'fx-fader-btn active';
          faderBtn.textContent = 'POST';
          faderBtn.title = 'Toggle pre/post volume fader';
          faderBtn.addEventListener('click', ev => {
            ev.stopPropagation();
            inst.postFader = !inst.postFader;
            faderBtn.textContent = inst.postFader ? 'POST' : 'PRE';
            faderBtn.classList.toggle('active', inst.postFader);
            s.rebuildFxChain();
          });
          hdrRight.appendChild(faderBtn);
          const removeBtn = document.createElement('button');
          removeBtn.className = 'fx-panel-remove';
          removeBtn.textContent = '✕';
          removeBtn.addEventListener('click', ev => {
            ev.stopPropagation();
            s.removeFxInstance(inst.uid);
            panelEl.remove();
          });
          hdrRight.appendChild(removeBtn);
          hdr.appendChild(hdrRight);
          const body = document.createElement('div');
          body.className = 'fx-body-inner';
          panelEl.appendChild(hdr);
          panelEl.appendChild(body);
          if (def.id === 'eq') {
            body.innerHTML = `
              <div class="crow" style="margin-bottom:5px;justify-content:flex-end">
                <button class="cbtn card-eq-clear" style="padding:3px 8px;font-size:9px">Clear</button>
              </div>
              <canvas class="card-eq-canvas" height="80" style="width:100%;display:block"></canvas>
              <div class="eq-hint">drag bands · scroll = Q</div>`;
            panelsEl.appendChild(panelEl);
            const canvas = body.querySelector('.card-eq-canvas');
            requestAnimationFrame(() => initEqCanvas(canvas, inst.eqData.bands, i => inst.eqData.applyBand(i), s.color));
          } else {
            FX_PANELS[def.id].build(body, inst.params, inst.node);
            panelsEl.appendChild(panelEl);
          }
        });
      }

      fxSection.appendChild(btnRow);
      fxSection.appendChild(panelsEl);
    }

    // ── EQ Canvas (shared, called from buildFxSection) ──
    function initEqCanvas(eqCanvas, eqBands, applyBandFn, color) {
      const eqCtx = eqCanvas.getContext('2d');
      const MIN_F = 20, MAX_F = 20000, MAX_G = 18;
      let dragBand = -1;

      function fToX(f, W) {
        return Math.log10(f / MIN_F) / Math.log10(MAX_F / MIN_F) * W;
      }
      function xToF(x, W) {
        return MIN_F * Math.pow(MAX_F / MIN_F, Math.max(0, Math.min(1, x / W)));
      }
      function gToY(g, H) { return (MAX_G - g) / (MAX_G * 2) * H; }
      function yToG(y, H) { return MAX_G - y / H * (MAX_G * 2); }

      function initCanvas() {
        eqCanvas.width = eqCanvas.offsetWidth || 264;
        eqCanvas.height = 80;
        draw();
      }

      function draw() {
        const W = eqCanvas.width, H = eqCanvas.height;
        if (!W || !H) return;
        const ctx = eqCtx;
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);

        // Grid
        const y0 = gToY(0, H);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
        [100, 1000, 10000].forEach(f => {
          const x = Math.round(fToX(f, W)) + 0.5;
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        });

        // Compute aggregate frequency response via temp BiquadFilterNodes
        const ac = Tone.context.rawContext;
        const freqs = new Float32Array(W);
        for (let i = 0; i < W; i++) freqs[i] = xToF(i, W);
        const totalDb = new Float32Array(W);
        eqBands.forEach(band => {
          const node = ac.createBiquadFilter();
          node.type = band.type;
          node.frequency.value = band.freq;
          node.Q.value = band.q;
          if (band.type === 'peaking') node.gain.value = band.gain || 0;
          const mag = new Float32Array(W);
          node.getFrequencyResponse(freqs, mag, new Float32Array(W));
          for (let i = 0; i < W; i++) totalDb[i] += 20 * Math.log10(Math.max(1e-6, mag[i]));
        });

        // Fill between curve and 0dB
        const col = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(0, y0);
        for (let i = 0; i < W; i++) ctx.lineTo(i, Math.max(0, Math.min(H, gToY(totalDb[i], H))));
        ctx.lineTo(W, y0);
        ctx.closePath();
        ctx.fillStyle = col + '18';
        ctx.fill();

        // Response curve
        ctx.beginPath();
        ctx.strokeStyle = col;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < W; i++) {
          const y = Math.max(0, Math.min(H, gToY(totalDb[i], H)));
          if (i === 0) ctx.moveTo(i, y); else ctx.lineTo(i, y);
        }
        ctx.stroke();

        // Freq labels
        ctx.font = '8px Courier New';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        [[100, '100'], [1000, '1k'], [10000, '10k']].forEach(([f, l]) => {
          ctx.fillText(l, fToX(f, W), H - 1);
        });

        // dB labels
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        [12, -12].forEach(db => {
          ctx.fillText((db > 0 ? '+' : '') + db, 2, gToY(db, H));
        });

        // Band handles
        eqBands.forEach((band, i) => {
          const bx = Math.max(6, Math.min(W - 6, fToX(band.freq, W)));
          const by = band.type === 'peaking'
            ? Math.max(6, Math.min(H - 6, gToY(band.gain || 0, H)))
            : H / 2;
          const isHP = band.type === 'highpass';
          const isLP = band.type === 'lowpass';
          const isActive = isHP ? band.freq > 25
            : isLP ? band.freq < 19000
              : Math.abs(band.gain || 0) > 0.1;
          const r = dragBand === i ? 7 : 5;

          if (isHP) {
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(bx, 0); ctx.lineTo(bx, H); ctx.lineTo(0, H);
            ctx.closePath();
            ctx.fillStyle = isActive ? col + '12' : '#ffffff06';
            ctx.fill();
          }
          if (isLP) {
            ctx.beginPath();
            ctx.moveTo(bx, 0); ctx.lineTo(W, 0); ctx.lineTo(W, H); ctx.lineTo(bx, H);
            ctx.closePath();
            ctx.fillStyle = isActive ? col + '12' : '#ffffff06';
            ctx.fill();
          }

          ctx.beginPath();
          ctx.arc(bx, by, r, 0, Math.PI * 2);
          ctx.fillStyle = isActive ? '#fff' : '#262626';
          ctx.fill();
          ctx.strokeStyle = isActive ? '#fff' : 'rgba(255,255,255,0.2)';
